<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پست دوم</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#000;
color:white;
}

.container{
max-width:430px;
margin:auto;
background:#000;
min-height:100vh;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
border-bottom:1px solid #222;
}

.user{
display:flex;
align-items:center;
gap:10px;
}

.user img{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
}

.post{
width:100%;
display:block;
}

.icons{
display:flex;
justify-content:space-between;
padding:12px;
font-size:24px;
}

.left{
display:flex;
gap:16px;
}

.likes{
padding:0 12px;
font-weight:bold;
margin-bottom:10px;
}

.caption{
padding:0 12px;
line-height:1.8;
margin-bottom:15px;
}

.caption b{
font-size:16px;
}

.comment{
padding:4px 12px;
}

.comment span{
font-weight:bold;
}

.date{
padding:15px 12px;
color:#8a8a8a;
font-size:13px;
}

a{
color:white;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<div class="header">

<a href="index.html">←</a>

<div class="user">
<img src="xx.png">
<b>the.smile</b>
</div>

<div>⋮</div>

</div>

<img class="post" src="mom.png">

<div class="icons">

<div class="left">
<span style="color:#ff2d55;">❤</span>
<span>💬</span>
<span>✈</span>
</div>

<div>🔖</div>

</div>

<div class="likes">
❤️ ۵۰ نفر این پست را پسندیده‌اند
</div>

<div class="caption">
<b>the.smile</b><br><br>

بعضی آدم‌ها می‌رن و با خودشون معنای «خونه» رو هم می‌برن...<br><br>

و بعضی بچه‌ها گم نمی‌شن... فقط کسی دنبالشون نمی‌گرده.
</div>

<div class="comment">
<span>Haru</span> امیدوارم هر کسی گم شده، یه روز راه خونه رو پیدا کنه...
</div>

<div class="comment">
<span>Yuna</span> این جمله تا مدت‌ها توی ذهنم می‌مونه...
</div>

<div class="date">
۱۵ می ۲۰۲۵
</div>

</div>

</body>

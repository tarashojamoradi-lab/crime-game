<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Clown Phone</title>

<link rel="stylesheet" href="phone.css">

</head>

<body>

<div id="phone">

    <!-- والپیپر -->

    <img
    id="wallpaper"
    src="oh.png"
    alt="Wallpaper">

    <!-- لایه تاریک -->

    <div id="darkOverlay"></div>

    <!-- فلش هنگام باز شدن -->

    <div id="unlockFlash"></div>

    <!-- ویگنت ساعت -->

    <div id="clockArea">

        <div id="time">

            00:00

        </div>

        <div id="date">

            Loading...

        </div>

    </div>

    <!-- نوار وضعیت -->

    <header id="statusBar">

        <div id="statusLeft">

            <span id="network">
                📶
            </span>

            <span id="wifi">
                📡
            </span>

        </div>

        <div id="statusCenter">

            <span id="carrier">

                Unknown

            </span>

        </div>

        <div id="statusRight">

            <span id="batteryPercent">

                100%

            </span>

            <div id="battery">

                <div id="batteryLevel"></div>

            </div>

        </div>

    </header>

    <!-- صفحه Pattern -->

    <section id="lockScreen">

        <svg
        id="patternSvg"
        width="100%"
        height="100%">

        </svg>

        <div id="patternGrid">

            <!-- ردیف اول -->

            <div class="row">

                <div
                class="dot"
                data-dot="1">

                    <div class="dotCore"></div>

                </div>

                <div
                class="dot"
                data-dot="2">

                    <div class="dotCore"></div>

                </div>

                <div
                class="dot"
                data-dot="3">

                    <div class="dotCore"></div>

                </div>

            </div>

            <!-- ردیف دوم -->

            <div class="row">

                <div
                class="dot"
                data-dot="4">

                    <div class="dotCore"></div>

                </div>

                <div
                class="dot"
                data-dot="5">

                    <div class="dotCore"></div>

                </div>

                <div
                class="dot"
                data-dot="6">

                    <div class="dotCore"></div>

                </div>

            </div>

            <!-- ردیف سوم -->

            <div class="row">

                <div
                class="dot"
                data-dot="7">

                    <div class="dotCore"></div>

                </div>

                <div
                class="dot"
                data-dot="8">

                    <div class="dotCore"></div>

                </div>

                <div
                class="dot"
                data-dot="9">

                    <div class="dotCore"></div>

                </div>

            </div>

        </div>
        <!-- پیام خطا -->

        <div id="patternError">

            الگوی وارد شده اشتباه است

        </div>

    </section>

    <!-- آیکون‌های پایین -->

    <div id="bottomBar">

        <button
        id="flashlightBtn"
        class="bottomButton"
        aria-label="Flashlight">

            <svg viewBox="0 0 24 24">

                <path d="M9 2h6v4h2v5c0 2.2-1.8 4-4 4h-2c-2.2 0-4-1.8-4-4V6h2V2zm1 2v2h4V4h-4zm1 12h2v6h-2z"/>

            </svg>

        </button>

        <button
        id="cameraBtn"
        class="bottomButton"
        aria-label="Camera">

            <svg viewBox="0 0 24 24">

                <path d="M9 4l1.5-2h3L15 4h3c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm3 14a5 5 0 100-10 5 5 0 000 10z"/>

            </svg>

        </button>

    </div>

    <!-- نوار پایین -->

    <div id="homeIndicator"></div>

</div>

<script src="phone.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Device</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  overflow:hidden;
  background:black;
}

/* ===== PHONE WRAPPER ===== */
#phone{
  position:fixed;
  inset:0;
  display:block;
}

/* ===== LOCK SCREEN ===== */
#lock{
  position:absolute;
  inset:0;
  background:url("oh.png") center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  color:white;
}

/* dark overlay like real phones */
#lock::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

/* content on top */
#top{
  position:relative;
  margin-top:80px;
  text-align:center;
  z-index:2;
}

#time{
  font-size:64px;
  font-weight:300;
  letter-spacing:2px;
}

#date{
  font-size:16px;
  opacity:0.8;
}

/* ===== PATTERN AREA ===== */
#patternBox{
  position:relative;
  z-index:2;
  margin-top:80px;
  width:260px;
  height:260px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-gap:25px;
}

.dot{
  width:22px;
  height:22px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.7);
  margin:auto;
  transition:0.2s;
}

.dot.active{
  background:white;
  transform:scale(1.2);
}

/* hint */
#hint{
  position:absolute;
  bottom:60px;
  z-index:2;
  font-size:14px;
  opacity:0.7;
}

/* shake animation */
.shake{
  animation:shake 0.3s;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-8px)}
  100%{transform:translateX(0)}
}

/* ===== HOME SCREEN ===== */
#home{
  position:absolute;
  inset:0;
  background:#000;
  display:none;
  color:white;
  padding:20px;
}
</style>
</head>

<body>

<div id="phone">

  <!-- LOCK SCREEN -->
  <div id="lock">

    <div id="top">
      <div id="time">00:00</div>
      <div id="date">---</div>
    </div>

    <!-- PATTERN -->
    <div id="patternBox">
      <div class="dot" data-id="1"></div>
      <div class="dot" data-id="2"></div>
      <div class="dot" data-id="3"></div>

      <div class="dot" data-id="4"></div>
      <div class="dot" data-id="5"></div>
      <div class="dot" data-id="6"></div>

      <div class="dot" data-id="7"></div>
      <div class="dot" data-id="8"></div>
      <div class="dot" data-id="9"></div>
    </div>

    <div id="hint">Draw unlock pattern</div>
  </div>

  <!-- HOME -->
  <div id="home">
    <h2>Welcome</h2>
  </div>

</div>

<script>

/* ===== TIME ===== */
function updateTime(){
  const now = new Date();

  document.getElementById("time").innerText =
    now.getHours().toString().padStart(2,"0") + ":" +
    now.getMinutes().toString().padStart(2,"0");

  document.getElementById("date").innerText =
    now.toDateString();
}
setInterval(updateTime,1000);
updateTime();

/* ===== PATTERN LOGIC ===== */
const correctPattern = ["1","4","7","5","3","6","9"];
let userPattern = [];
let drawing = false;

const dots = document.querySelectorAll(".dot");
const lock = document.getElementById("lock");

function addDot(dot){
  const id = dot.dataset.id;

  if(!userPattern.includes(id)){
    userPattern.push(id);
    dot.classList.add("active");
  }
}

/* mouse */
dots.forEach(dot=>{
  dot.addEventListener("mousedown", ()=>{
    drawing = true;
    addDot(dot);
  });

  dot.addEventListener("mouseenter", ()=>{
    if(drawing) addDot(dot);
  });

  dot.addEventListener("touchstart", ()=>{
    drawing = true;
    addDot(dot);
  });
});

/* finish draw */
document.addEventListener("mouseup", check);
document.addEventListener("touchend", check);

function check(){
  drawing = false;

  if(userPattern.join("") === correctPattern.join("")){
    unlock();
  }else{
    wrong();
  }

  reset();
}

function wrong(){
  lock.classList.add("shake");

  if(navigator.vibrate){
    navigator.vibrate([100,50,100]);
  }

  setTimeout(()=>{
    lock.classList.remove("shake");
  },300);
}

function reset(){
  userPattern = [];
  dots.forEach(d=>d.classList.remove("active"));
}

function unlock(){
  document.getElementById("lock").style.display = "none";
  document.getElementById("home").style.display = "block";
}

</script>

</body>
</html>

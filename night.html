<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>CASE PROFILE</title>

<style>
body{
  margin:0;
  font-family:"Tahoma","Vazirmatn","Arial";
  background:black;
  color:white;
  overflow:hidden;
  direction:rtl;
}

/* بک‌گراند محو */
.bg{
  position:fixed;
  inset:0;
  background:url("back.png") no-repeat center center;
  background-size:cover;
  filter:blur(6px) brightness(0.3);
  z-index:-1;
}

/* لایه تیره */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

/* کانتینر */
.container{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* متن‌ها */
.text{
  font-size:22px;
  line-height:2;
  opacity:0;
  transition:1s;
}

/* عکس */
.photo{
  position:absolute;
  top:20px;
  right:20px;
  width:140px;
  height:180px;
  background:url("mot.jpg") no-repeat center center;
  background-size:cover;
  border:2px solid white;
}

/* دکمه */
.btn{
  margin-top:30px;
  padding:12px 20px;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
  display:none;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="photo"></div>

<div class="container">

  <div id="t1" class="text">نام شناسایی شد:</div>
  <div id="t2" class="text">مطهره</div>

  <div id="t3" class="text">۱۳۸۷/۴/۶</div>

  <div id="t4" class="text">وضعیت:</div>
  <div id="t5" class="text">تحت نظارت</div>

  <button id="btn" class="btn" onclick="start()">شروع پرونده</button>

</div>

<script>

const texts = ["t1","t2","t3","t4","t5"];
let i = 0;

function showNext(){

  if(i > 0){
    document.getElementById(texts[i-1]).style.opacity = 0.3;
  }

  if(i < texts.length){
    let el = document.getElementById(texts[i]);
    el.style.opacity = 1;
    i++;

    setTimeout(showNext, 1800);
  } else {
    document.getElementById("btn").style.display = "block";
  }
}

window.onload = ()=>{
  setTimeout(showNext, 1200);
};

function start(){
  window.location.href = "wow.html";
}

</script>

</body>
</html>

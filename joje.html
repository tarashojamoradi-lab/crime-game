<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>joje chat</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0f;
  color:white;
}

/* TOP */
.top{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:rgba(20,20,30,0.85);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  object-fit:cover;
}

/* CALL BUTTONS */
.callBox{
  display:flex;
  gap:10px;
}

.btn{
  cursor:pointer;
  opacity:0.8;
  font-size:18px;
}

/* CHAT */
#chat{
  padding:12px;
  height:calc(100vh - 140px);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px;
  border-radius:14px;
  animation:pop 0.2s ease;
}

@keyframes pop{
  from{transform:scale(0.9);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.other{
  background:#3a0f1f;
  align-self:flex-end;
}

.me{
  background:rgba(255,255,255,0.08);
  align-self:flex-start;
}

.time{
  font-size:10px;
  opacity:0.5;
  margin-top:4px;
}

/* INPUT */
.inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:8px;
  padding:10px;
  background:rgba(20,20,30,0.9);
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
  background:#1e1e2a;
  color:white;
}

.send{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ff4d4d;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.voice{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#333;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

/* CALL UI */
.callScreen{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.callAvatar{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.callBtns{
  margin-top:20px;
  display:flex;
  gap:20px;
}

.callBtn{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  cursor:pointer;
}

.accept{background:green;}
.decline{background:red;}
</style>
</head>

<body>

<audio id="ring" src="ring.mp3"></audio>

<!-- CALL SCREEN -->
<div class="callScreen" id="callScreen">
  <img src="kaw.png" class="callAvatar">
  <div style="margin-top:10px;font-size:18px;">جوجه سیرکی در حال تماس...</div>

  <div class="callBtns">
    <div class="callBtn accept" onclick="acceptCall()">✔</div>
    <div class="callBtn decline" onclick="declineCall()">✖</div>
  </div>
</div>

<!-- TOP -->
<div class="top">

  <div class="btn" onclick="location.href='home.html'">🏠</div>

  <div class="profile">
    <img src="kaw.png" class="avatar">
    <div>جوجه سیرکی</div>
  </div>

  <div class="callBox">
    <div class="btn" onclick="fakeCall()">📞</div>
    <div class="btn" onclick="history.back()">←</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="inputBox">
  <div class="voice"
    onmousedown="startRec()" 
    onmouseup="stopRec()">🎤</div>

  <input id="text" placeholder="پیام بنویس...">
  <div class="send" onclick="sendMsg()">➤</div>
</div>

<script>

const chat=document.getElementById("chat");
const ring=document.getElementById("ring");
const callScreen=document.getElementById("callScreen");

/* messages */
const messages=[
  {type:"other", text:"هنوزم موقع عصبی شدن ناخن‌هاتو می‌جَوی؟", time:"14:01"},
  {type:"me", text:"هنوزم موقع ترسیدن زیاد حرف می‌زنی؟", time:"14:02"},
  {type:"other", text:"نه.", time:"14:03"},
  {type:"other", text:"الان فقط می‌شمرم.", time:"14:03"},
  {type:"me", text:"چی رو؟", time:"14:04"},
  {type:"other", text:"کسایی که بعد از آشنایی با تو ناپدید شدن.", time:"14:05"}
];

function render(){
  chat.innerHTML="";
  messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+m.type;
    div.innerHTML=`${m.text}<div class="time">${m.time}</div>`;
    chat.appendChild(div);
  });
  chat.scrollTop=chat.scrollHeight;
}

/* SEND */
function sendMsg(){
  const input=document.getElementById("text");
  if(!input.value.trim()) return;

  const now=new Date();
  const time=now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");

  messages.push({type:"me",text:input.value,time});
  input.value="";
  render();
}

/* FAKE CALL */
function fakeCall(){
  callScreen.style.display="flex";
  ring.currentTime=0;
  ring.play();

  if(navigator.vibrate){
    navigator.vibrate([400,300,400,300]);
  }

  // auto cut if not answered
  autoCut=setTimeout(()=>{
    declineCall();
  },4000);
}

let autoCut;

/* ACCEPT */
function acceptCall(){
  ring.pause();
  callScreen.style.display="none";
  clearTimeout(autoCut);
}

/* DECLINE */
function declineCall(){
  ring.pause();
  callScreen.style.display="none";
  clearTimeout(autoCut);
}

/* VOICE REC */
let rec, chunks=[];

async function startRec(){
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  rec=new MediaRecorder(stream);
  chunks=[];

  rec.ondataavailable=e=>chunks.push(e.data);

  rec.onstop=()=>{
    const blob=new Blob(chunks,{type:"audio/webm"});
    const url=URL.createObjectURL(blob);

    const now=new Date();
    const time=now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");

    messages.push({
      type:"me",
      voice:url,
      time
    });

    render();
  };

  rec.start();
}

function stopRec(){
  if(rec && rec.state!=="inactive"){
    rec.stop();
  }
}

render();

</script>

</body>
</html>

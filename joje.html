<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chat</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0f;
  color:white;
}

/* TOP */
.top{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:rgba(20,20,30,0.85);
  backdrop-filter:blur(12px);
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#2b2b3a;
}

/* CHAT */
#chat{
  padding:12px;
  height:calc(100vh - 120px);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:12px;
  font-size:14px;
  line-height:1.4;
}

.me{
  background:#1f1f2e;
  align-self:flex-start;
}

.other{
  background:#3a0f1f;
  align-self:flex-end;
}

/* CALL SCREEN */
.callScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(#000,#111);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.callAvatar{
  width:120px;
  height:120px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid #444;
}

.callAvatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.callText{
  margin-top:15px;
  font-size:18px;
}

.actions{
  margin-top:25px;
  display:flex;
  gap:20px;
}

.btn{
  padding:12px 18px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

.answer{background:#2ecc71;}
.decline{background:#e74c3c;}

.endBtn{
  margin-top:25px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:red;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<audio id="ring" src="ring.mp3" loop></audio>

<!-- TOP -->
<div class="top">

  <div class="profile">
    <div class="avatar"></div>
    <div>شوخی بی‌مزه</div>
  </div>

  <div onclick="startCall()" style="cursor:pointer;font-size:18px;">📞</div>

</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- CALL -->
<div class="callScreen" id="callScreen">

  <div class="callAvatar">
    <img src="dar.png">
  </div>

  <div class="callText">
    تماس ورودی از رز سفید
  </div>

  <div class="actions" id="actions">
    <div class="btn answer" onclick="answerCall()">Answer</div>
    <div class="btn decline" onclick="declineCall()">Decline</div>
  </div>

  <div class="endBtn" id="endBtn" onclick="endCall()">✖</div>

</div>

<script>

const chat=document.getElementById("chat");
const ring=document.getElementById("ring");

let callStarted=false;
let timeoutCall;

/* CHAT FIXED */
const messages=[
{type:"other",text:"هنوزم موقع عصبی شدن ناخن‌هاتو می‌جَوی؟"},
{type:"me",text:"هنوزم موقع ترسیدن زیاد حرف می‌زنی؟"},
{type:"other",text:"نه."},
{type:"other",text:"الان فقط می‌شمرم."},
{type:"me",text:"چی رو؟"},
{type:"other",text:"کسایی که بعد از آشنایی با تو ناپدید شدن."}
];

function render(){
  chat.innerHTML="";
  messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+m.type;
    div.innerText=m.text;
    chat.appendChild(div);
  });
}

render();

/* AUTO CALL ONCE ONLY */
setTimeout(()=>{
  if(!callStarted){
    incomingCall();
    callStarted=true;
  }
},2000);

/* MANUAL CALL */
function startCall(){
  if(!callStarted){
    incomingCall();
    callStarted=true;
  }
}

/* CALL */
function incomingCall(){
  document.getElementById("callScreen").style.display="flex";

  ring.currentTime=0;
  ring.play();

  if(navigator.vibrate){
    navigator.vibrate([400,200,400]);
  }

  timeoutCall=setTimeout(()=>{
    endCall();
  },6000);
}

/* ANSWER */
function answerCall(){
  ring.pause();
  document.getElementById("actions").style.display="none";
  document.getElementById("endBtn").style.display="flex";
}

/* DECLINE */
function declineCall(){
  endCall();
}

/* END */
function endCall(){
  document.getElementById("callScreen").style.display="none";
  ring.pause();
  clearTimeout(timeoutCall);
}

</script>

</body>
</html>

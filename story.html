<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حقیقت آشکار شد</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow-x:hidden;
}

body{
font-family:'Vazirmatn',sans-serif;
background:url('bride.png') no-repeat center center;
background-size:cover;
min-height:100vh;
color:white;
position:relative;
animation:zoomBg 40s ease-in-out infinite alternate;
}

@keyframes zoomBg{
from{background-size:100%;}
to{background-size:115%;}
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.08);
z-index:0;
pointer-events:none;
}

#container{
position:relative;
z-index:2;
width:100%;
min-height:100vh;
padding:0;
margin:0;
}

#sceneBox{
width:100%;
max-width:none;
text-align:center;
padding:20px;
}

.scene{
font-size:34px;
line-height:2;
font-weight:600;
opacity:0;
transform:translateY(25px);
transition:1s;
white-space:pre-line;
text-shadow:0 0 20px rgba(0,0,0,.8);
}

.scene.show{
opacity:1;
transform:translateY(0);
}

#hint{
position:fixed;
bottom:25px;
left:0;
right:0;
text-align:center;
font-size:15px;
color:white;
animation:pulse 2s infinite;
z-index:10;
text-shadow:0 0 10px black;
}

@keyframes pulse{
50%{opacity:.4;}
}

#finalStory{
display:none;
width:100%;
max-width:none;
padding:20px;
text-align:right;
line-height:2.4;
font-size:20px;
animation:fadeIn 1.5s;
text-shadow:0 2px 10px rgba(0,0,0,.9);
}

#finalStory h1{
text-align:center;
margin-bottom:35px;
font-size:42px;
}

#finalStory p{
margin-bottom:26px;
background:rgba(0,0,0,.10);
padding:18px;
border-radius:12px;
}
  #closed{
text-align:center;
font-size:30px;
margin-top:50px;
font-weight:bold;
color:#ffe0e0;
text-shadow:0 0 15px rgba(255,0,0,.4);
}

.redReveal{
font-size:54px;
color:#ff4b4b;
font-weight:bold;
text-shadow:0 0 30px rgba(255,0,0,.8);
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@media(max-width:768px){

.scene{
font-size:25px;
}

.redReveal{
font-size:38px;
}

#finalStory{
font-size:17px;
padding:15px;
line-height:2.2;
}

#finalStory h1{
font-size:30px;
}

#finalStory p{
padding:14px;
}

}

</style>
</head>

<body>

<div id="container">
<div id="sceneBox">

<div id="sceneText" class="scene show">
حقیقت از آنچه همه تصور می‌کردند پیچیده‌تر بود...
</div>

<div id="finalStory">

<h1>حقیقت آشکار شد</h1>

<!-- (کل متن داستانت همون قبلی بدون تغییر) -->

<div id="closed">
پرونده بسته شد
</div>

</div>
</div>
</div>

<div id="hint">برای ادامه صفحه را لمس کنید</div>

<script>

const scenes = [
"حقیقت از آنچه همه تصور می‌کردند پیچیده‌تر بود...",
"الیوت گناهکار بود...\n\nاما قاتل نبود.",
"وقتی الیزابت از خیانت همسرش آگاه شد...\n\nچیزی در درونش فرو ریخت.",
"سال‌ها تحقیر...\n\nسال‌ها سکوت...\n\nسال‌ها رنج...",
"او سال‌ها برای دیگران زندگی کرد...\n\nاما هرگز دوست داشته نشد.",
'<div class="redReveal">قاتل...\n\nالیزابت بومونت بود.</div>',
"اما این تنها بخشی از حقیقت بود..."
];

let currentScene = 0;

const sceneText = document.getElementById("sceneText");
const finalStory = document.getElementById("finalStory");
const hint = document.getElementById("hint");

document.body.addEventListener("click",()=>{

if(currentScene < scenes.length-1){

sceneText.classList.remove("show");

setTimeout(()=>{
currentScene++;
sceneText.innerHTML = scenes[currentScene];
sceneText.classList.add("show");
},400);

}else{

sceneText.style.display="none";
hint.style.display="none";

document.getElementById("container").style.alignItems="flex-start";

finalStory.style.display="block";

window.scrollTo({top:0,behavior:"smooth"});
}

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Messages</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial,sans-serif}
.phone{max-width:430px;margin:auto;min-height:100vh;background:#000}
header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #222}
header .title{font-weight:bold}
.center{display:flex;flex-direction:column;justify-content:center;align-items:center;height:80vh;text-align:center;padding:20px}
.icon{width:84px;height:84px;border:2px solid #666;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:18px}
h2{margin:0 0 10px}
p{color:#9a9a9a;line-height:1.6;max-width:280px}
</style>
</head>
<body>
<div class="phone">
<header>
<span>←</span>
<div class="title">the.smile</div>
<span>✎</span>
</header>
<div class="center">
<div class="icon">💬</div>
<h2>هنوز هیچ گفت‌وگویی نداری</h2>
<p>وقتی با کسی گفتگو کنی، پیام‌هایت اینجا نمایش داده می‌شوند.</p>
</div>
</div>
</body>
</html>

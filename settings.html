<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f10;
  color: white;
}

/* Full screen */
.screen {
  width: 100vw;
  height: 100vh;
  padding: 20px;
  box-sizing: border-box;
}

/* Header */
h1 {
  font-size: 22px;
  margin-bottom: 20px;
}

/* Card style */
.card {
  background: #1c1c1e;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
}

/* List item */
.item {
  padding: 12px;
  border-bottom: 1px solid #2c2c2e;
}

.item:last-child {
  border-bottom: none;
}

/* Add contact */
.add {
  color: #4da3ff;
  cursor: pointer;
  user-select: none;
}

/* AI message popup */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  padding: 12px 18px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.5s;
}

/* PIN modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.pin-box {
  font-size: 24px;
  letter-spacing: 10px;
}
</style>
</head>

<body>

<div class="screen">

  <h1>Settings</h1>

  <div class="card">
    <div class="item">Wi-Fi</div>
    <div class="item">Bluetooth</div>
    <div class="item">Privacy</div>
  </div>

  <div class="card">
    <h3>Emergency Contacts</h3>
    <div class="item">Mother</div>
    <div class="item">Police</div>
    <div class="item">Doctor</div>
    <div class="item add" id="addBtn">+ Add Contact</div>
  </div>

</div>

<!-- AI Toast -->
<div class="toast" id="toast"></div>

<!-- PIN Modal -->
<div class="modal" id="modal">
  <div>
    <h2>احراز هویت لازم است</h2>
    <div class="pin-box" id="pin">_ _ _ _</div>
  </div>
</div>

<script>
let visits = localStorage.getItem("visits") || 0;
visits++;
localStorage.setItem("visits", visits);

const toast = document.getElementById("toast");

function showToast(text){
  toast.innerText = text;
  toast.style.opacity = 1;

  setTimeout(() => {
    toast.style.opacity = 0;
  }, 2000);
}

/* AI Messages */
setTimeout(() => {
  if(visits == 1) showToast("...");
  else if(visits == 2) showToast("I know you're looking for the truth.");
  else if(visits >= 3) showToast("Check the camera.");
}, 800);

/* Fake camera effect on 3rd visit */
if(visits >= 3){
  setTimeout(() => {
    document.body.style.filter = "blur(2px)";
  }, 3000);
}

/* Long press for secret */
const addBtn = document.getElementById("addBtn");
const modal = document.getElementById("modal");

let pressTimer;

addBtn.addEventListener("mousedown", startPress);
addBtn.addEventListener("touchstart", startPress);

addBtn.addEventListener("mouseup", cancelPress);
addBtn.addEventListener("mouseleave", cancelPress);
addBtn.addEventListener("touchend", cancelPress);

function startPress(){
  pressTimer = setTimeout(() => {
    modal.style.display = "flex";
  }, 2000); // 2 seconds hold
}

function cancelPress(){
  clearTimeout(pressTimer);
}

/* Close modal on click */
modal.addEventListener("click", () => {
  modal.style.display = "none";
});
</script>

</body>
</html>

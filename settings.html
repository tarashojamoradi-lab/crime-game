<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mystery Settings</title>

<style>
body{
margin:0;
background:#111;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.phone{
width:330px;
height:650px;
background:#1b1b1b;
border-radius:25px;
overflow:hidden;
position:relative;
}

h2{
padding:20px;
margin:0;
background:#222;
}

.item{
padding:16px 20px;
border-bottom:1px solid #333;
cursor:pointer;
}

.item:hover{
background:#2b2b2b;
}

#hidden{
display:none;
color:#00ff88;
}

#toast{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
background:#000;
padding:10px 18px;
border-radius:20px;
display:none;
}

#popup{
position:absolute;
inset:0;
background:#000d;
display:none;
justify-content:center;
align-items:center;
}

#box{
background:#222;
padding:25px;
border-radius:15px;
width:250px;
text-align:center;
}

input{
width:35px;
height:40px;
font-size:24px;
text-align:center;
margin:4px;
background:#111;
color:white;
border:none;
}

.glitch{
animation:g .2s 4;
}

@keyframes g{
0%{transform:translate(3px);}
50%{transform:translate(-3px);}
100%{transform:translate(0);}
}

.note{
font-size:13px;
color:#888;
padding:15px;
}
</style>

</head>
<body>

<div class="phone">

<div id="toast"></div>

<h2>⚙ Settings</h2>

<div class="item">Network</div>
<div class="item">Display</div>

<div class="item">
Battery
<br><small>84%<br>
Health: Good<br>
Last User:
<span id="user">████████</span>
</small>
</div>

<div class="item">Privacy</div>

<div class="item" id="about">
About Phone
</div>

<div class="item" id="hidden">
████ Hidden Service ████
</div>

<div class="item">
Emergency Contacts
</div>

<div class="item"
id="hold">
+ Add Contact
</div>

<div class="note">
Hold +Add Contact 2 sec
</div>

<div id="popup">
<div id="box">

<h3>Authentication Required</h3>

<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">

</div>
</div>

</div>

<script>

let click=0;

about.onclick=function(){

click++;

if(click==5){

document.querySelector(".phone").classList.add("glitch");

toast.innerHTML="Developer Mode Enabled";
toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
hidden.style.display="block";
},1500);

}

}

// باتری آلوده

setInterval(()=>{

user.innerHTML="DECEASED";

setTimeout(()=>{

user.innerHTML="████████";

},1200);

},7000);

// پیام‌های AI

let msgs=[
"...",
"You shouldn't be here.",
"I know you're looking for the truth.",
"Check the camera."
];

let i=0;

window.onload=function(){

show();

}

function show(){

if(i<msgs.length){

toast.innerHTML=msgs[i++];

toast.style.display="block";

setTimeout(()=>{

toast.style.display="none";

},2500);

}

}

// رمز مخفی

let t;

hold.onmousedown=()=>{

t=setTimeout(()=>{

popup.style.display="flex";

},2000);

}

hold.onmouseup=()=>clearTimeout(t);

hold.onmouseleave=()=>clearTimeout(t);

popup.onclick=()=>popup.style.display="none";

</script>

</body>
</html>

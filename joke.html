<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0b0b0f;
color:#fff;
overflow:hidden;
}

/* TOP */
.top{
position:fixed;
top:0;
right:0;
left:0;
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
background:rgba(18,18,25,.9);
backdrop-filter:blur(14px);
z-index:20;
border-bottom:1px solid rgba(255,255,255,.08);
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:38px;
height:38px;
border-radius:50%;
background:#777;
}

.name{
font-weight:bold;
}

/* CHAT */
#chat{
position:fixed;
top:60px;
bottom:70px;
left:0;
right:0;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.centerMsg{
text-align:center;
opacity:.6;
margin-top:20px;
font-size:13px;
}

.msg{
max-width:75%;
padding:10px;
border-radius:12px;
}

.me{
background:#202030;
align-self:flex-start;
}

.other{
background:#3b1020;
align-self:flex-end;
}

.time{
font-size:10px;
opacity:.6;
margin-top:4px;
}

/* INPUT */
.inputBox{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
display:flex;
gap:8px;
padding:10px;
background:#171722;
}

input{
flex:1;
border:none;
border-radius:25px;
padding:0 15px;
background:#252535;
color:#fff;
outline:none;
}

.send,.voice{
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#333;
cursor:pointer;
}

/* CALL */
#callScreen{
position:fixed;
inset:0;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
background:#050505;
z-index:99999;
}

.callAvatar{
width:150px;
height:150px;
border-radius:50%;
background:#444;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

.callName{
margin-top:20px;
font-size:20px;
}

.callState{
opacity:.7;
margin-top:8px;
}

.endCall{
margin-top:40px;
width:70px;
height:70px;
border-radius:50%;
background:red;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:30px;
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="ring" src="bogh.html"></audio>

<!-- TOP -->
<div class="top">

<div class="profile">
<div class="avatar"></div>
<div class="name">پیک ناشناس</div>
</div>

<div style="display:flex;gap:15px;font-size:20px;cursor:pointer;">
<div onclick="startCall()">📞</div>
<div>🎥</div>
</div>

</div>

<!-- CHAT -->
<div id="chat">
<div class="centerMsg">تاریخچه پیام پاک شد</div>
</div>

<!-- INPUT -->
<div class="inputBox">
<div class="voice"
onmousedown="startRec()"
onmouseup="stopRec()">🎤</div>

<input id="text" placeholder="پیام بنویس...">
<div class="send" onclick="sendMsg()">➤</div>
</div>

<!-- CALL SCREEN -->
<div id="callScreen">

<div class="callAvatar">📞</div>

<div class="callName">پیک ناشناس</div>
<div class="callState" id="state">در حال تماس...</div>

<div class="endCall" onclick="endCall()">✖</div>

</div>

<script>

const chat = document.getElementById("chat");
const ring = document.getElementById("ring");
const state = document.getElementById("state");

let recorder;
let chunks = [];
let callTimer;

/* SEND MESSAGE */
function sendMsg(){
const input = document.getElementById("text");
if(!input.value.trim()) return;

const now = new Date();

const div = document.createElement("div");
div.className = "msg me";

div.innerHTML = `
${input.value}
<div class="time">${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}</div>
`;

chat.appendChild(div);
input.value = "";
chat.scrollTop = chat.scrollHeight;
}

/* CALL */
function startCall(){

document.getElementById("callScreen").style.display = "flex";

state.innerText = "در حال برقراری تماس...";

ring.currentTime = 0;
ring.play().catch(()=>{});

callTimer = setTimeout(()=>{
state.innerText = "پاسخی دریافت نشد";
setTimeout(endCall, 2000);
}, 8000);

}

/* END CALL */
function endCall(){

document.getElementById("callScreen").style.display = "none";
ring.pause();
ring.currentTime = 0;
clearTimeout(callTimer);

}

/* VOICE REC */
async function startRec(){

try{

const stream = await navigator.mediaDevices.getUserMedia({audio:true});

recorder = new MediaRecorder(stream);
chunks = [];

recorder.ondataavailable = e => chunks.push(e.data);

recorder.onstop = ()=>{

const blob = new Blob(chunks,{type:"audio/webm"});
const url = URL.createObjectURL(blob);

const now = new Date();

const div = document.createElement("div");
div.className = "msg me";

div.innerHTML = `
🎤 ویس
<audio controls src="${url}"></audio>
<div class="time">${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}</div>
`;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;

stream.getTracks().forEach(t=>t.stop());

};

recorder.start();

}catch(e){
alert("میکروفون اجازه ندارد");
}

}

function stopRec(){
if(recorder && recorder.state !== "inactive"){
recorder.stop();
}
}

</script>

</body>
</html>

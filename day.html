<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>CASE ERROR</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ffcc;
  font-family:monospace;
  overflow:hidden;
  transition:0.1s;
}

/* افکت هک (فلش سریع) */
.flash{
  animation: flashAnim 0.12s infinite;
}

@keyframes flashAnim{
  0%{background:black; filter:brightness(0.2);}
  50%{background:#111; filter:brightness(1.8);}
  100%{background:black; filter:brightness(0.3);}
}

/* صفحه */
.screen{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* متن تایپ */
#text{
  width:80%;
  text-align:center;
  font-size:18px;
  white-space:pre-line;
}

/* دکمه ادامه */
.btn{
  margin-top:30px;
  padding:10px 20px;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
  display:none;
}
</style>
</head>

<body>

<div class="screen">
  <div id="text"></div>
  <button id="nextBtn" class="btn" onclick="goNext()">ادامه</button>
</div>

<script>

const lines = [
"⚠ پرونده اشتباهی باز شد...",
"",
"یا شاید...",
"",
"دقیقاً همان کسی وارد این پرونده شده که باید می‌شد."
];

let i = 0;
let char = 0;
let current = "";
let box = document.getElementById("text");

function type(){

  if(i >= lines.length){
    document.body.classList.remove("flash");
    document.getElementById("nextBtn").style.display = "block";
    return;
  }

  let line = lines[i];

  if(char < line.length){
    current += line.charAt(char);
    box.innerHTML = current;
    char++;
    setTimeout(type, 35);
  } else {
    current += "\n";
    box.innerHTML = current;
    i++;
    char = 0;
    setTimeout(type, 700);
  }
}

window.onload = ()=>{

  // شروع افکت هک
  document.body.classList.add("flash");

  // لرزش نوری تصادفی برای حس هک
  setInterval(()=>{
    let r = Math.random();
    document.body.style.filter = `brightness(${0.3 + r}) contrast(${1 + r})`;
  }, 80);

  setTimeout(type, 1200);
};

function goNext(){
  window.location.href = "night.html";
}

</script>

</body>
</html>

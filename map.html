<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAP // DEEP TRACE SYSTEM</title>

<!-- Leaflet -->
<link rel="stylesheet" href="[Leaflet CSS](https://reference-url-citation.invalid/0)" />

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#05070a;
  overflow:hidden;
  color:white;
}

/* TOP BAR */
#top{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:55px;
  background:rgba(10,10,10,0.9);
  backdrop-filter: blur(10px);
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
}

#title{
  font-size:14px;
  letter-spacing:2px;
}

#btn{
  background:#111;
  border:1px solid #333;
  color:white;
  padding:6px 10px;
  border-radius:8px;
}

/* MAP */
#map{
  position:absolute;
  top:55px;
  bottom:0;
  left:0;
  right:0;
}

/* PANEL */
#panel{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.85);
  padding:12px;
  border-top:1px solid #222;
  z-index:999;
  font-size:13px;
}

/* GLITCH */
.glitch{
  animation:gl 0.2s infinite;
}
@keyframes gl{
  0%{transform:translate(0,0);}
  25%{transform:translate(1px,-1px);}
  50%{transform:translate(-1px,1px);}
  75%{transform:translate(1px,1px);}
  100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<div id="top">
  <div id="title">MAP // MEMORY TRACE SYSTEM</div>
  <button id="btn" onclick="toggle()">MEMORY MODE</button>
</div>

<div id="map"></div>

<div id="panel">
📍 آخرین وضعیت: نامشخص<br>
📡 GPS: ناپایدار<br>
🧠 حافظه مکانی: تکه‌تکه شده<br><br>

🧾 آخرین سرچ‌ها:<br>
- abandoned village japan<br>
- erase location history<br>
- unknown signal near me
</div>

<script src="[Leaflet JS](https://reference-url-citation.invalid/1)"></script>

<script>

let memory = false;

/* MAP INIT (real map) */
let map = L.map('map').setView([35.6762, 139.6503], 12); 
// Tokyo default

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);

/* ===== FAKE LOCATIONS ===== */
let ghostMarkers = [];

/* Tokyo normal points */
let m1 = L.marker([35.68,139.69]).addTo(map).bindPopup("📍 آخرین موقعیت ثبت شده");
let m2 = L.marker([35.66,139.64]).addTo(map).bindPopup("📍 مسیر تکراری");

/* ===== JAPAN ABANDONED VILLAGE ===== */
let kuro = L.marker([35.2, 138.5]).addTo(map).bindPopup(`
🇯🇵 Kurogawa Village<br>
⚠️ حذف شده از نقشه در 1965<br>
🧠 آخرین سیگنال: همین حالا<br>
`);

/* ghost route line */
let line = L.polyline([
  [35.68,139.69],
  [35.67,139.66],
  [35.66,139.64],
  [35.60,139.60]
], {color:'cyan',weight:2,opacity:0.4}).addTo(map);

/* MEMORY MODE EFFECTS */
function toggle(){

  memory = !memory;

  if(memory){

    document.getElementById("btn").innerText = "NORMAL MODE";
    document.getElementById("panel").classList.add("glitch");

    map.eachLayer(layer=>{
      if(layer._path){
        layer.setStyle({opacity:0.2});
      }
    });

    startGhostActivity();

  }else{

    document.getElementById("btn").innerText = "MEMORY MODE";
    document.getElementById("panel").classList.remove("glitch");

    location.reload(); // reset simplest safe way
  }
}

/* ===== GHOST SYSTEM ===== */
function startGhostActivity(){

  setInterval(()=>{

    if(!memory) return;

    let lat = 35.65 + (Math.random()*0.1);
    let lng = 139.65 + (Math.random()*0.1);

    let g = L.circleMarker([lat,lng],{
      radius:6,
      color:"red",
      fillColor:"red",
      fillOpacity:0.6
    }).addTo(map);

    g.bindPopup("⚠️ حرکت غیرعادی ثبت شد");

    ghostMarkers.push(g);

    document.getElementById("title").innerText =
      "⚠️ SIGNAL DETECTED // UNKNOWN MOVEMENT";

    setTimeout(()=>{
      document.getElementById("title").innerText =
        "MAP // MEMORY TRACE SYSTEM";
    },1500);

  },3000);
}

/* fake watcher event */
setTimeout(()=>{
  if(memory){
    alert("📡 هشدار:\n\nیک سیگنال غیرمجاز به داده‌های موقعیت شما متصل شد...");
  }
},8000);

</script>

</body>
</html>

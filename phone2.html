<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Device</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  overflow:hidden;
  background:black;
}

/* ===== PHONE WRAPPER ===== */
#phone{
  position:fixed;
  inset:0;
  display:block;
}

/* ===== LOCK SCREEN ===== */
#lock{
  position:absolute;
  inset:0;
  background:url("oh.png") center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  color:white;
}

/* dark overlay */
#lock::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

/* ===== STATUS BAR ===== */
#statusBar{
  position:absolute;
  top:10px;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  font-size:12px;
  opacity:0.9;
  z-index:3;
  color:white;
  font-weight:300;
}

/* ===== NOTIFICATION ===== */
#notif{
  position:absolute;
  top:-80px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(25,25,25,0.95);
  color:white;
  padding:12px 16px;
  border-radius:14px;
  font-size:12px;
  z-index:5;
  border:1px solid rgba(255,255,255,0.08);
  opacity:0;
  transition:0.5s ease;
}

#notif.show{
  top:110px;
  opacity:1;
}

/* ===== TOP TIME ===== */
#top{
  position:relative;
  margin-top:80px;
  text-align:center;
  z-index:2;
}

#time{
  font-size:64px;
  font-weight:300;
  letter-spacing:2px;
}

#date{
  font-size:16px;
  opacity:0.8;
}

/* ===== PATTERN ===== */
#patternBox{
  position:relative;
  z-index:2;
  margin-top:80px;
  width:260px;
  height:260px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-gap:25px;
}

.dot{
  width:22px;
  height:22px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.7);
  margin:auto;
  transition:0.2s;
}

.dot.active{
  background:white;
  transform:scale(1.2);
}

/* hint */
#hint{
  position:absolute;
  bottom:60px;
  z-index:2;
  font-size:14px;
  opacity:0.7;
}

/* shake */
.shake{
  animation:shake 0.3s;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-8px)}
  100%{transform:translateX(0)}
}

/* ===== HOME ===== */
#home{
  position:absolute;
  inset:0;
  background:#000;
  display:none;
  color:white;
  padding:20px;
}
</style>
</head>

<body>

<div id="phone">

  <!-- LOCK -->
  <div id="lock">

    <!-- STATUS BAR -->
    <div id="statusBar">
      <div class="left">📶 LTE</div>
      <div class="right">📡 📶 🔋 85%</div>
    </div>

    <!-- NOTIFICATION -->
    <div id="notif">📩 پیام خوانده‌نشده: «به الگو دست نزن...»</div>

    <!-- TIME -->
    <div id="top">
      <div id="time">00:00</div>
      <div id="date">---</div>
    </div>

    <!-- PATTERN -->
    <div id="patternBox">
      <div class="dot" data-id="1"></div>
      <div class="dot" data-id="2"></div>
      <div class="dot" data-id="3"></div>

      <div class="dot" data-id="4"></div>
      <div class="dot" data-id="5"></div>
      <div class="dot" data-id="6"></div>

      <div class="dot" data-id="7"></div>
      <div class="dot" data-id="8"></div>
      <div class="dot" data-id="9"></div>
    </div>

    <div id="hint">Draw unlock pattern</div>
  </div>

  <!-- HOME -->
  <div id="home">
    <h2>Welcome</h2>
  </div>

</div>

<script>

/* ===== TIME ===== */
function updateTime(){
  const now = new Date();

  document.getElementById("time").innerText =
    now.getHours().toString().padStart(2,"0") + ":" +
    now.getMinutes().toString().padStart(2,"0");

  document.getElementById("date").innerText =
    now.toDateString();
}
setInterval(updateTime,1000);
updateTime();

/* ===== NOTIFICATION ===== */
setTimeout(()=>{
  const notif = document.getElementById("notif");
  notif.classList.add("show");

  setTimeout(()=>{
    notif.classList.remove("show");
  },4000);

},1500);

/* ===== PATTERN ===== */
const correctPattern = ["1","4","7","5","3","6","9"];
let userPattern = [];
let drawing = false;

const dots = document.querySelectorAll(".dot");
const lock = document.getElementById("lock");

function addDot(dot){
  const id = dot.dataset.id;

  if(!userPattern.includes(id)){
    userPattern.push(id);
    dot.classList.add("active");
  }
}

/* TOUCH + MOUSE */
dots.forEach(dot=>{
  dot.addEventListener("mousedown", ()=>{
    drawing = true;
    addDot(dot);
  });

  dot.addEventListener("touchstart", (e)=>{
    drawing = true;
    addDot(dot);
    e.preventDefault();
  });
});

/* DRAG */
document.addEventListener("touchmove", (e)=>{
  if(!drawing) return;

  const touch = e.touches[0];
  const element = document.elementFromPoint(touch.clientX, touch.clientY);

  if(element && element.classList.contains("dot")){
    addDot(element);
  }
});

document.addEventListener("mousemove", (e)=>{
  if(!drawing) return;

  const element = document.elementFromPoint(e.clientX, e.clientY);

  if(element && element.classList.contains("dot")){
    addDot(element);
  }
});

/* END */
document.addEventListener("mouseup", check);
document.addEventListener("touchend", check);

function check(){
  drawing = false;

  if(userPattern.join("") === correctPattern.join("")){
    unlock();
  } else {
    wrong();
  }

  reset();
}

function wrong(){
  lock.classList.add("shake");

  if(navigator.vibrate){
    navigator.vibrate([120,60,120]);
  }

  setTimeout(()=>{
    lock.classList.remove("shake");
  },300);
}

function reset(){
  userPattern = [];
  dots.forEach(d=>d.classList.remove("active"));
}

/* 🔥 ONLY CHANGE: redirect to home.html */
function unlock(){
  window.location.href = "home2.html";
}

</script>

</body>
</html>

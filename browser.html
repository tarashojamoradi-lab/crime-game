<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Secure Chrome</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0b10;
  color:#fff;
}

/* TOP BAR */
.topbar{
  display:flex;
  align-items:center;
  gap:6px;
  padding:10px;
  background:#141420;
  border-bottom:1px solid #222;
}

.icon{
  background:#1f1f2e;
  border:none;
  color:#fff;
  padding:8px 10px;
  border-radius:10px;
  cursor:pointer;
}

.url{
  flex:1;
  background:#1c1c2a;
  border:none;
  color:#fff;
  padding:10px;
  border-radius:12px;
  outline:none;
}

/* HISTORY PANEL */
.history{
  padding:10px;
}

.item{
  background:#161625;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  border-left:3px solid #00ff9d;
  cursor:pointer;
  transition:.2s;
}

.item:hover{
  transform:scale(1.01);
  background:#1d1d33;
}

/* LOADING */
.loading{
  color:#00ff9d;
  padding:10px;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.3;}
}

/* BOTTOM NAV */
.navbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#141420;
  border-top:1px solid #222;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav{
  color:#aaa;
  font-size:13px;
  cursor:pointer;
}

.nav:hover{
  color:#fff;
}

/* NOTIFICATION */
.notif{
  position:fixed;
  top:10px;
  right:10px;
  background:#1c1c2a;
  border-left:3px solid #ff2e63;
  padding:10px;
  border-radius:10px;
  display:none;
  max-width:260px;
  font-size:13px;
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(-5px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- NOTIFICATION -->
<div id="notif" class="notif"></div>

<!-- TOP BAR -->
<div class="topbar">
  <button class="icon" onclick="home()">🏠</button>
  <button class="icon" onclick="back()">⬅</button>
  <input id="search" class="url" placeholder="جستجو در تاریخچه..." />
  <button class="icon" onclick="runSearch()">GO</button>
</div>

<!-- HISTORY -->
<div id="history" class="history"></div>

<!-- BOTTOM NAV -->
<div class="navbar">
  <div class="nav" onclick="home()">Home</div>
  <div class="nav" onclick="back()">Back</div>
  <div class="nav" onclick="addTab()">Tabs</div>
  <div class="nav" onclick="reload()">Reload</div>
</div>

<script>

/* ===== HISTORY واقعی-نما (فقط داستانی) ===== */
let historyData = [
  "چگونه دل کسی را به دست بیاورم",
  "چرا بعضی آدم‌ها ناگهان سرد می‌شوند",
  "معنی سکوت طولانی در رابطه چیست",
  "چطور فراموش کنیم کسی را",
  "نشانه‌های تغییر رفتار ناگهانی انسان"
];

/* render history */
function render(){
  const box = document.getElementById("history");
  box.innerHTML = "";

  historyData.forEach((h, i)=>{
    const d = document.createElement("div");
    d.className = "item";
    d.innerText = h;

    d.onclick = ()=>{
      showFakePage(h);
    };

    box.appendChild(d);
  });
}
render();

/* ===== SEARCH ===== */
function runSearch(){
  const q = document.getElementById("search").value;

  const box = document.getElementById("history");
  box.innerHTML = "<div class='loading'>در حال جستجو در تاریخچه...</div>";

  setTimeout(()=>{
    const newItem = q;

    historyData.unshift(newItem);
    render();

    // random system event
    systemEvent();

  }, 900);
}

/* ===== FAKE PAGE OPEN ===== */
function showFakePage(text){
  document.getElementById("history").innerHTML = `
    <div class="item">
📄 صفحه باز شده

${text}

---------------------
وضعیت: ذخیره شده در حافظه مرورگر
زمان همگام‌سازی: نامشخص
    </div>
  `;
}

/* ===== SYSTEM EVENTS (ترس subtle) ===== */
function systemEvent(){

  const events = [
    "تاریخچه شما در حال همگام‌سازی با سرور ناشناخته است",
    "یک دستگاه دیگر به این مرورگر متصل شد",
    "داده‌های ذخیره‌شده در حال بازنویسی هستند",
    "یک نشست قدیمی دوباره فعال شد",
    "فعالیت غیرعادی در تاریخچه شناسایی شد"
  ];

  if(Math.random() > 0.3){
    showNotif(events[Math.floor(Math.random()*events.length)]);
  }

  // sometimes inject fake history entry
  if(Math.random() > 0.6){
    setTimeout(()=>{
      historyData.push("این جستجو از دستگاه دیگر وارد شده است");
      render();
    }, 1200);
  }
}

/* ===== NOTIFICATION (فارسی) ===== */
function showNotif(text){
  const n = document.getElementById("notif");
  n.innerText = "📡 " + text;
  n.style.display = "block";

  setTimeout(()=>{
    n.style.display = "none";
  }, 3500);
}

/* ===== NAVIGATION ===== */
function home(){
  location.href = "home.html";
}

function back(){
  history.back();
}

function reload(){
  location.reload();
}

function addTab(){
  showNotif("یک تب جدید بدون درخواست شما باز شد");
}

/* ===== BACKGROUND RANDOM BEHAVIOR ===== */
setInterval(()=>{
  if(Math.random() > 0.85){
    showNotif("همگام‌سازی پس‌زمینه فعال شد");
  }
}, 8000);

</script>

</body>
</html>

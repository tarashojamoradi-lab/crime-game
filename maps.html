<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Crime Map</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma,sans-serif;
}

html,body{

width:100%;
height:100%;
overflow:hidden;
background:#050505;
color:white;

}

#map{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
overflow:hidden;
touch-action:none;

}

#map img{

position:absolute;
left:0;
top:0;
width:100%;
height:100%;
object-fit:cover;
user-select:none;
-webkit-user-drag:none;
transform-origin:center center;
transition:transform .15s linear;

}

/* پنل سیگنال */

#signal{

position:absolute;

left:20px;

top:20px;

width:180px;

background:rgba(10,10,10,.72);

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,.12);

border-radius:18px;

padding:16px;

box-shadow:0 0 25px rgba(0,0,0,.5);

z-index:50;

}

#signal h3{

color:#ff3b3b;

font-size:20px;

margin-bottom:14px;

letter-spacing:1px;

}

#signal p{

margin:8px 0;

color:#cfcfcf;

font-size:15px;

}

.active{

color:#ff3b3b!important;

font-weight:bold;

}

/* پیام بالا */

#topMessage{

position:absolute;

left:50%;

transform:translateX(-50%);

top:22px;

width:430px;

max-width:92%;

padding:18px;

background:rgba(15,15,15,.75);

backdrop-filter:blur(8px);

border-radius:18px;

border:1px solid rgba(255,255,255,.12);

text-align:center;

font-size:22px;

z-index:55;

}

/* قطب نما */

#compass{

position:absolute;

right:25px;

top:22px;

width:105px;

height:105px;

border-radius:50%;

background:rgba(10,10,10,.75);

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,.12);

display:flex;

align-items:center;

justify-content:center;

font-size:52px;

z-index:60;

}

/* دکمه های زوم */

#zoom{

position:absolute;

left:25px;

top:210px;

display:flex;

flex-direction:column;

gap:10px;

z-index:60;

}

.zoomBtn{

width:58px;

height:58px;

border:none;

border-radius:15px;

background:rgba(15,15,15,.82);

color:white;

font-size:34px;

cursor:pointer;

border:1px solid rgba(255,255,255,.15);

}

/* مقصد */

#destination{

display:none;

position:absolute;

background:rgba(10,10,10,.82);

border:1px solid #ff2d2d;

color:white;

padding:10px 16px;

border-radius:12px;

font-size:18px;

box-shadow:0 0 20px rgba(255,0,0,.5);

z-index:80;

}

/* نقشه کوچک */

#miniMap{

position:absolute;

right:20px;

bottom:20px;

width:170px;

height:170px;

background:rgba(10,10,10,.72);

border-radius:16px;

border:1px solid rgba(255,255,255,.12);

overflow:hidden;

z-index:60;

}

#miniMap img{

width:100%;

height:100%;

object-fit:cover;

}

#miniPoint{

position:absolute;

width:10px;

height:10px;

background:red;

border-radius:50%;

left:50%;

top:50%;

transform:translate(-50%,-50%);

box-shadow:0 0 15px red;

}
/* باکس معما */

#questionBox{

position:absolute;

left:50%;

bottom:25px;

transform:translateX(-50%);

width:480px;

max-width:92%;

background:rgba(10,10,10,.78);

backdrop-filter:blur(10px);

border-radius:22px;

padding:22px;

border:1px solid rgba(255,255,255,.15);

z-index:70;

box-shadow:0 0 35px rgba(0,0,0,.45);

}

#questionBox h2{

font-size:24px;

margin-bottom:18px;

text-align:center;

}

#answer{

width:100%;

padding:15px;

border-radius:14px;

border:none;

outline:none;

background:#1d1d1d;

color:white;

font-size:18px;

margin-bottom:15px;

}

#check{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:#d60000;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

#check:hover{

background:#ff2020;

}

#result{

margin-top:14px;

text-align:center;

font-size:18px;

font-weight:bold;

min-height:24px;

}

/* مسیر */

#route{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

pointer-events:none;

z-index:40;

}

/* نقطه مقصد */

#destination{

animation:pulse 1.2s infinite;

cursor:pointer;

}

@keyframes pulse{

50%{

transform:scale(1.08);

}

}

</style>

</head>

<body>

<div id="map">

<img src="map.png" id="mapImage">

<canvas id="route"></canvas>

<div id="topMessage">

سیستم ردیابی پرونده

</div>

<div id="signal">

<h3>Signal</h3>

<p class="active">● در انتظار پاسخ...</p>

<p id="signalStatus">سیگنالی یافت نشد.</p>

</div>

<div id="compass">

🧭

</div>

<div id="zoom">

<button class="zoomBtn" id="zoomIn">+</button>

<button class="zoomBtn" id="zoomOut">−</button>

</div>

<div id="destination">

📍 مقصد نامشخص

</div>

<div id="miniMap">

<img src="map.png">

<div id="miniPoint"></div>

</div>

<div id="questionBox">

<h2>

او با چه کسی اینجا بوده؟

</h2>

<input

id="answer"

type="text"

placeholder="پاسخ را وارد کنید">

<button id="check">

بررسی پاسخ

</button>

<div id="result"></div>

</div>

</div>

<script>
const map = document.getElementById("mapImage");
const canvas = document.getElementById("route");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ---------- Zoom ---------- */

let scale = 1;
let posX = 0;
let posY = 0;

function updateMap(){

    map.style.transform =
        `translate(${posX}px,${posY}px) scale(${scale})`;

}

document.getElementById("zoomIn").onclick=function(){

    scale+=0.2;

    if(scale>4) scale=4;

    updateMap();

}

document.getElementById("zoomOut").onclick=function(){

    scale-=0.2;

    if(scale<1) scale=1;

    updateMap();

}

/* ---------- Drag ---------- */

let dragging=false;

let startX=0;

let startY=0;

map.onmousedown=function(e){

dragging=true;

startX=e.clientX-posX;

startY=e.clientY-posY;

}

window.onmouseup=function(){

dragging=false;

}

window.onmousemove=function(e){

if(!dragging)return;

posX=e.clientX-startX;

posY=e.clientY-startY;

updateMap();

}

/* ---------- Mobile ---------- */

map.addEventListener("touchstart",function(e){

dragging=true;

startX=e.touches[0].clientX-posX;

startY=e.touches[0].clientY-posY;

});

map.addEventListener("touchmove",function(e){

if(!dragging)return;

posX=e.touches[0].clientX-startX;

posY=e.touches[0].clientY-startY;

updateMap();

});

map.addEventListener("touchend",function(){

dragging=false;

});

/* ---------- Answer ---------- */

document.getElementById("check").onclick=function(){

let answer=document
.getElementById("answer")
.value
.trim()
.toLowerCase();

if(

answer=="میتسوکی"

||

answer=="میتسوکی آمانه"

||

answer=="mitsuki"

||

answer=="mitsuki amane"

){

document.getElementById("result").style.color="#6cff6c";

document.getElementById("result").innerHTML="پاسخ صحیح است...";

document.getElementById("signalStatus").innerHTML="مسیر شناسایی شد.";

setTimeout(drawRoute,800);

}

else{

document.getElementById("result").style.color="#ff6060";

document.getElementById("result").innerHTML="پاسخ اشتباه است.";

}

}

/* ---------- Draw Route ---------- */

function drawRoute(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.setLineDash([12,8]);

ctx.lineWidth=5;

ctx.strokeStyle="#ff0000";

let startX=canvas.width-80;

let startY=canvas.height*0.30;

let endX=canvas.width*0.52;

let endY=canvas.height*0.55;

let t=0;

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.beginPath();

ctx.moveTo(startX,startY);

ctx.lineTo(

startX+(endX-startX)*t,

startY+(endY-startY)*t

);

ctx.stroke();

t+=0.015;

if(t<=1){

requestAnimationFrame(animate);

}

else{

showDestination(endX,endY);

}

}

animate();

}
function showDestination(x,y){

const destination=document.getElementById("destination");

destination.style.display="block";

destination.style.left=(x-25)+"px";

destination.style.top=(y-20)+"px";

}

/* ---------- کلیک روی مقصد ---------- */

document.getElementById("destination").onclick=function(){

window.location.href="location.html";

}

/* ---------- چرخش قطب نما ---------- */

const compass=document.getElementById("compass");

let angle=0;

setInterval(function(){

angle+=0.25;

compass.style.transform="rotate("+angle+"deg)";

},30);

/* ---------- تغییر اندازه Canvas ---------- */

window.addEventListener("resize",function(){

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

});

/* ---------- بزرگنمایی با اسکرول ---------- */

document.addEventListener("wheel",function(e){

if(e.deltaY<0){

scale+=0.15;

}else{

scale-=0.15;

}

if(scale<1) scale=1;

if(scale>4) scale=4;

updateMap();

});

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<title>Mystery Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{

margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:tahoma;

}

#map{

width:100%;
height:100%;

}

.leaflet-container{

background:#000;

}

/* ---------- UI گوشی ---------- */

#phoneUI{

position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
justify-content:space-between;
color:white;
z-index:9999;
font-size:14px;
pointer-events:none;
text-shadow:0 0 10px black;

}

#notify{

position:absolute;
top:45px;
left:50%;
transform:translateX(-50%);

background:#111;
border:1px solid red;

padding:10px 18px;

color:#ff4444;

display:none;

z-index:9999;

box-shadow:0 0 20px red;

border-radius:8px;

}

/* ---------- پنجره معما ---------- */

.popup{

text-align:center;

width:220px;

}

.popup input{

width:90%;

padding:8px;

margin-top:10px;

background:#111;

color:white;

border:1px solid red;

}

.popup button{

margin-top:10px;

padding:8px 15px;

background:#700;

color:white;

border:none;

cursor:pointer;

}

/* ---------- اسکن ---------- */

#scanner{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

background:rgba(0,0,0,.88);

padding:25px;

color:#00ff66;

display:none;

font-size:22px;

z-index:9999;

border:1px solid #00ff66;

box-shadow:0 0 25px #00ff66;

text-align:center;

}

/* ---------- سایه ---------- */

#shadow{

position:absolute;

left:17%;

top:58%;

width:45px;

height:100px;

background:black;

border-radius:50% 50% 20% 20%;

opacity:0;

z-index:700;

filter:blur(2px);

}

/* ---------- مه ---------- */

#fog{

position:absolute;

width:100%;

height:100%;

background:
radial-gradient(circle,
transparent 20%,
rgba(30,30,30,.55) 75%);

animation:fog 8s infinite alternate;

pointer-events:none;

z-index:500;

}

@keyframes fog{

from{

opacity:.7;

}

to{

opacity:.95;

}

}

/* ---------- فلیکر ---------- */

.flicker{

animation:flick .18s 4;

}

@keyframes flick{

0%{

filter:brightness(1);

}

50%{

filter:brightness(.15);

}

100%{

filter:brightness(1);

}

}

</style>

</head>

<body>

<div id="phoneUI">

<div id="clock"></div>

<div>📡 GPS</div>

<div>🔋38%</div>

</div>

<div id="notify">

📡 سیگنال جدید دریافت شد...

</div>

<div id="scanner">

درحال اسکن...

<div id="percent">

0%

</div>

</div>

<div id="shadow"></div>

<div id="fog"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const width=1000;
const height=700;

const map=L.map('map',{

crs:L.CRS.Simple,

minZoom:-2,

maxZoom:2

});

const bounds=[[0,0],[height,width]];

L.imageOverlay("map.png",bounds).addTo(map);

map.fitBounds(bounds);
  // ---------- ساعت ----------

function updateClock(){

const now=new Date();

let h=String(now.getHours()).padStart(2,"0");
let m=String(now.getMinutes()).padStart(2,"0");

document.getElementById("clock").innerHTML=h+":"+m;

}

updateClock();

setInterval(updateClock,1000);

// ---------- مسیر ----------

let route;

// ---------- نقطه جنگل ----------

const forestMarker=L.marker([525,190]).addTo(map);

forestMarker.bindPopup(`

<div class="popup">

<b>🌲 جنگل متروکه</b>

<br><br>

او با چه کسی اینجا بوده؟

<br>

<input id="answer">

<br>

<button onclick="checkAnswer()">

ارسال

</button>

<br><br>

<div id="result"></div>

</div>

`);

// ---------- بررسی جواب ----------

window.checkAnswer=function(){

let txt=document
.getElementById("answer")
.value
.trim()
.toLowerCase();

if(

txt=="میتسوکی"

||

txt=="میتسوکی آمانه"

){

document.getElementById("result").innerHTML=

"<span style='color:lime'>✔ درست</span>";

startSequence();

}

else{

document.getElementById("result").innerHTML=

"<span style='color:red'>❌ اشتباه</span>";

}

}

// ---------- شروع اتفاقات ----------

function startSequence(){

document.body.classList.add("flicker");

setTimeout(()=>{

document.body.classList.remove("flicker");

showShadow();

},500);

}

// ---------- سایه ----------

function showShadow(){

const s=document.getElementById("shadow");

s.style.opacity=.8;

setTimeout(()=>{

s.style.opacity=0;

showNotify();

},350);

}

// ---------- اعلان ----------

function showNotify(){

const n=document.getElementById("notify");

n.style.display="block";

setTimeout(()=>{

n.style.display="none";

scanGPS();

},2000);

}

// ---------- اسکن ----------

function scanGPS(){

const scan=document.getElementById("scanner");

scan.style.display="block";

let p=0;

const timer=setInterval(()=>{

p+=5;

document.getElementById("percent").innerHTML=p+"%";

if(p>=100){

clearInterval(timer);

scan.style.display="none";

drawRoute();

}

},80);
// ---------- کشیدن مسیر ----------

function drawRoute(){

document.getElementById("fog").style.transition="2s";
document.getElementById("fog").style.opacity=".2";

const points=[

[525,190],

[510,240],

[490,290],

[470,340],

[445,395],

[420,455],

[395,510],

[370,560],

[345,610],

[325,655],

[300,705],

[270,755],

[245,805],

[225,850]

];

route=L.polyline([],{

color:"#ff0000",

weight:6,

opacity:1,

lineCap:"round",

lineJoin:"round",

className:"redRoute"

}).addTo(map);

let i=0;

const timer=setInterval(()=>{

route.addLatLng(points[i]);

i++;

if(i>=points.length){

clearInterval(timer);

finishMission();

}

},220);

}

// ---------- پایان مسیر ----------

function finishMission(){

const end=L.marker([225,850]).addTo(map);

end.bindPopup(

"<b>🏠 سرنخ جدید پیدا شد...</b><br>مرحله بعد"

).openPopup();

}
</script>

<style>

.redRoute{

filter:

drop-shadow(0 0 3px red)

drop-shadow(0 0 8px red)

drop-shadow(0 0 18px red);

animation:redGlow 1s infinite alternate;

}

@keyframes redGlow{

from{

filter:

drop-shadow(0 0 2px red)

drop-shadow(0 0 6px red);

}

to{

filter:

drop-shadow(0 0 8px red)

drop-shadow(0 0 18px red)

drop-shadow(0 0 30px red);

}

}

</style>

</body>

</html>

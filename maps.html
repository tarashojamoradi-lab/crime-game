<!DOCTYPE html>
<html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crime Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:tahoma,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#050505;color:#fff}
#map{position:fixed;inset:0;overflow:hidden}
#map img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform-origin:center}
.glass{background:rgba(12,12,12,.65);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:14px}
#top{position:absolute;left:50%;top:12px;transform:translateX(-50%);padding:10px 18px;font-size:17px}
#signal{position:absolute;left:12px;top:12px;width:145px;padding:12px}
#signal h3{font-size:15px;color:#ff4444;margin-bottom:8px}
#signal p{font-size:12px;color:#ddd}
#compass{position:absolute;right:12px;top:12px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:32px}
#zoom{position:absolute;left:12px;top:140px;display:flex;flex-direction:column;gap:8px}
#zoom button{width:42px;height:42px;border:none;border-radius:10px;background:#171717;color:#fff;font-size:24px}
#question{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:330px;max-width:92%;padding:16px}
#question h2{font-size:18px;margin-bottom:10px;text-align:center}
#answer{width:100%;padding:10px;border:none;border-radius:10px;background:#1f1f1f;color:#fff}
#check{width:100%;margin-top:10px;padding:10px;border:none;border-radius:10px;background:#c40000;color:#fff}
#result{margin-top:8px;text-align:center;font-size:14px}
#clock,#gps{position:absolute;right:12px;padding:6px 10px;font-size:11px}
#clock{top:86px}#gps{top:114px}
#scan{position:absolute;left:0;right:0;height:2px;background:rgba(255,0,0,.35);animation:scan 5s linear infinite}
@keyframes scan{from{top:0}to{top:100%}}
</style></head><body>
<div id="map">
<div id="scan"></div>
<img src="ba.png" id="mapImage">
<div id="top" class="glass">سیستم ردیابی پرونده</div>
<div id="signal" class="glass"><h3>TRACKING</h3><p>ONLINE</p><p id="status">در انتظار پاسخ...</p></div>
<div id="compass" class="glass">🧭</div>
<div id="clock" class="glass"></div>
<div id="gps" class="glass">LAT 35.6892<br>LON 51.3890</div>
<div id="zoom"><button id="zin">+</button><button id="zout">−</button></div>
<div id="question" class="glass">
<h2>او با چه کسی اینجا بوده؟</h2>
<input id="answer" placeholder="پاسخ را وارد کنید">
<button id="check">بررسی پاسخ</button>
<div id="result"></div>
</div></div>
<script>
const m=document.getElementById('mapImage');let s=1,x=0,y=0,d=false,sx=0,sy=0;
function u(){m.style.transform=`translate(${x}px,${y}px) scale(${s})`;}
zin.onclick=()=>{s=Math.min(4,s+.2);u()};zout.onclick=()=>{s=Math.max(1,s-.2);u()};
m.onmousedown=e=>{d=true;sx=e.clientX-x;sy=e.clientY-y};onmouseup=()=>d=false;
onmousemove=e=>{if(!d)return;x=e.clientX-sx;y=e.clientY-sy;u()};
check.onclick=()=>{let a=answer.value.trim().toLowerCase();
if(["میتسوکی","میتسوکی آمانه","mitsuki","mitsuki amane"].includes(a)){
result.style.color="#7cff7c";result.textContent="پاسخ صحیح...";
status.textContent="دسترسی تایید شد";
setTimeout(()=>location.href="location.html",600);
}else{result.style.color="#ff6b6b";result.textContent="پاسخ اشتباه است.";}}
setInterval(()=>clock.textContent=new Date().toLocaleTimeString('fa-IR'),1000);
let ang=0;setInterval(()=>{ang+=.4;compass.style.rotate=ang+'deg';},30);
</script></body></html>

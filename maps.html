<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Unknown Signal Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:sans-serif;
}

#map{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
}

#notif{
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  border:1px solid red;
  color:#fff;
  padding:10px 15px;
  border-radius:10px;
  display:none;
  z-index:9999;
  font-size:13px;
}

#panel{
  position:absolute;
  top:15px;
  left:15px;
  width:230px;
  background:rgba(0,0,0,0.75);
  border-radius:12px;
  padding:12px;
  color:#fff;
  z-index:9999;
  font-size:13px;
}

#searchBox{
  position:absolute;
  top:15px;
  right:15px;
  width:200px;
  z-index:9999;
}

#searchBox input{
  width:100%;
  padding:8px;
  border-radius:8px;
  background:#111;
  color:#fff;
  border:1px solid #333;
}

/* ✅ اضافه شده: تاریخچه */
#history{
  display:none;
  margin-top:5px;
  background:rgba(0,0,0,0.85);
  border:1px solid red;
  border-radius:10px;
  max-height:140px;
  overflow:auto;
}

#history div{
  padding:6px;
  font-size:12px;
  border-bottom:1px solid #222;
  cursor:pointer;
  color:#fff;
}

.destination-label{
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:5px 8px;
  border:1px solid red;
  border-radius:8px;
  font-size:12px;
}

.red-line{
  stroke:red;
  stroke-width:4;
  filter: drop-shadow(0 0 6px red);
}

#noise{
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/3ZQ3ZQp.png");
  opacity:0;
  pointer-events:none;
  z-index:99999;
  mix-blend-mode:screen;
}
</style>
</head>

<body>

<div id="noise"></div>
<div id="notif"></div>

<div id="panel">
🧩 معما<br>
<small>او با چه کسی اینجا بوده؟</small>
<input id="ans" placeholder="پاسخ...">
<button onclick="check()">تأیید</button>
</div>

<div id="searchBox">
<input placeholder="جستجو..." onclick="showHistory()" oninput="fakeSearch(this.value)">
<div id="history"></div>
</div>

<div id="map"></div>

<script>

let map;
let solved=false;

/* فقط ۴ تاریخچه عجیب */
const fakeHistory=[
"سیگنال از لایه 7 فعال شد",
"کاربر ناشناس: N-442 ثبت شد",
"داده حذف شده اما هنوز قابل مشاهده است",
"اتصال به هیچ‌جا برقرار شد"
];

const fakeQueries=[
"سیگنال ناشناخته شناسایی شد...",
"داده در حال رمزگشایی است...",
"اتصال غیرمجاز ثبت شد",
"ردیابی در حال اجراست...",
"هیچ داده‌ای یافت نشد"
];

function notify(t){
  const n=document.getElementById("notif");
  n.innerText=t;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",2000);
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }
}

function runNoise(){
  const n=document.getElementById("noise");
  n.style.opacity=1;
  setTimeout(()=>n.style.opacity=0,2000);
}

function cinematicZoom(){
  document.getElementById("map").style.filter="contrast(1.4) brightness(1.2) saturate(1.3)";
  document.getElementById("map").style.transform="scale(1.05)";
  setTimeout(()=>{
    document.getElementById("map").style.filter="none";
    document.getElementById("map").style.transform="scale(1)";
  },3000);
}

function initMap(){

  const img=new Image();
  img.src="maps.png";

  img.onload=function(){

    const W=img.naturalWidth;
    const H=img.naturalHeight;

    map=L.map("map",{
      crs:L.CRS.Simple,
      minZoom:-2,
      maxZoom:4,
      zoomControl:true,
      dragging:true,
      scrollWheelZoom:true
    });

    const bounds=[[0,0],[H,W]];

    L.imageOverlay("map.png",bounds).addTo(map);

    map.fitBounds(bounds);
    map.setMaxBounds(bounds);

    setupPuzzle();
  }
}

function setupPuzzle(){
  const p=[900,900];

  L.circleMarker(p,{radius:8,color:"red"})
  .addTo(map)
  .bindPopup("🧩 نقطه معما");
}

function check(){
  if(solved) return;

  const v=document.getElementById("ans").value.trim();

  if(v==="میتسوکی" || v==="میتسوکی آمانه"){
    solved=true;
    document.getElementById("panel").style.display="none";
    runNoise();

    setTimeout(()=>{
      drawPath();
      vibrate();
    },2000);
  }
}

function drawPath(){

  const center=[2000,2000];

  const path=[
    [900,900],
    [1300,1500],
    [1700,1800],
    center
  ];

  L.polyline(path,{
    color:"red",
    weight:4,
    className:"red-line"
  }).addTo(map);

  map.flyTo(center,2.5,{duration:2});

  cinematicZoom();
}

function fakeSearch(v){
  if(v.length>2){
    const msg=fakeQueries[Math.floor(Math.random()*fakeQueries.length)];
    notify("🔎 "+msg);
  }
}

/* ✅ اضافه شده: نمایش تاریخچه */
function showHistory(){
  const box=document.getElementById("history");
  box.style.display="block";
  box.innerHTML="";

  fakeHistory.forEach(h=>{
    const d=document.createElement("div");
    d.innerText=h;
    box.appendChild(d);
  });
}

initMap();

</script>

</body>
</html>

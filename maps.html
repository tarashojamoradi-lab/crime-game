<!DOCTYPE html>
<html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crime Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:tahoma,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#050505;color:#fff}
#map{position:fixed;inset:0;overflow:hidden}
#map img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform-origin:center;z-index:1}
#scan{position:absolute;left:0;right:0;height:2px;background:#ff0000;box-shadow:0 0 14px #ff0000;animation:scan 5s linear infinite;z-index:5}
@keyframes scan{from{top:0}to{top:100%}}
.glass{background:rgba(12,12,12,.65);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:14px;z-index:10;position:absolute}
#top{left:50%;top:12px;transform:translateX(-50%);padding:10px 18px;font-size:17px}
#signal{left:12px;top:12px;width:145px;padding:12px}
#compass{right:12px;top:12px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:32px}
#question{left:50%;bottom:18px;transform:translateX(-50%);width:330px;max-width:92%;padding:16px}
#answer,#check{width:100%;padding:10px;border-radius:10px;border:none}#answer{background:#222;color:#fff}#check{margin-top:10px;background:#b00;color:#fff}
#result{margin-top:8px;text-align:center}
</style></head><body>
<div id="map">
<img src="ba.png" id="mapImage"><div id="scan"></div>
<div id="top" class="glass">سیستم ردیابی پرونده</div>
<div id="signal" class="glass"><b>TRACKING</b><div id="status">در انتظار پاسخ...</div></div>
<div id="compass" class="glass">🧭</div>
<div id="question" class="glass"><h3>او با چه کسی اینجا بوده؟</h3><input id="answer"><button id="check">بررسی پاسخ</button><div id="result"></div></div>
</div>
<script>
check.onclick=()=>{
let a=answer.value.trim().toLowerCase();
if(["میتسوکی","میتسوکی آمانه","mitsuki","mitsuki amane"].includes(a)){
result.style.color="#7cff7c";result.textContent="پاسخ صحیح...";
status.textContent="دسترسی تایید شد";
scan.style.background="#00ff66";
scan.style.boxShadow="0 0 18px #00ff66";
setTimeout(()=>location.href="location.html",800);
}else{result.style.color="#ff6666";result.textContent="پاسخ اشتباه است.";}
};
let ang=0;setInterval(()=>{ang+=.4;compass.style.rotate=ang+"deg"},30);
</script></body></html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chat</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0f;
  color:white;
}

/* TOP */
.top{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:rgba(20,20,30,0.85);
  backdrop-filter:blur(12px);
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  object-fit:cover;
}

/* CHAT */
#chat{
  padding:12px;
  height:calc(100vh - 140px);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px;
  border-radius:12px;
}

.me{background:#1e1e2a; align-self:flex-start;}
.other{background:#3a0f1f; align-self:flex-end;}

.time{
  font-size:10px;
  opacity:0.6;
  margin-top:4px;
}

/* INPUT */
.inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:8px;
  padding:10px;
  background:rgba(20,20,30,0.9);
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#1e1e2a;
  color:white;
}

.send,.voice{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#333;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

/* VOICE MESSAGE */
.voiceMsg{
  background:#2b2b3a;
  padding:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<audio id="ring" src="bogh.mp3"></audio>

<!-- TOP -->
<div class="top">
  <div class="btn" onclick="location.href='home.html'">🏠</div>

  <div class="profile">
    <img src="kaw.png" class="avatar">
    <div>مسئول نظم</div>
  </div>

  <div class="callBox">
    <div onclick="startCall()" style="cursor:pointer;">📞</div>
    <div onclick="fakeVideo()" style="cursor:pointer;">🎥</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="inputBox">
  <div class="voice" onmousedown="startRec()" onmouseup="stopRec()">🎤</div>
  <input id="text" placeholder="پیام بنویس...">
  <div class="send" onclick="sendMsg()">➤</div>
</div>

<script>

const chat=document.getElementById("chat");

/* messages */
const messages=[
  {type:"other", text:"جلسه فردا ساعت ۹.", time:"09:00"},
  {type:"other", text:"لطفاً این بار مست نباش.", time:"09:01"},
  {type:"me", text:"قول نمی‌دم.", time:"09:02"}
];

function render(){
  chat.innerHTML="";

  messages.forEach(m=>{
    const div=document.createElement("div");

    if(m.voice){
      div.className="voiceMsg me";
      div.innerHTML=`
        🎤 پیام صوتی<br>
        <audio controls src="${m.voice}"></audio>
        <div class="time">${m.time}</div>
      `;
    } else {
      div.className="msg "+m.type;
      div.innerHTML=`${m.text}<div class="time">${m.time||""}</div>`;
    }

    chat.appendChild(div);
  });

  chat.scrollTop=chat.scrollHeight;
}

/* SEND */
function sendMsg(){
  const input=document.getElementById("text");
  if(!input.value.trim()) return;

  const now=new Date();
  const time=now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");

  messages.push({type:"me", text:input.value, time});
  input.value="";
  render();
}

/* CALL */
function startCall(){
  const ring=new Audio("bogh.mp3");
  ring.play();

  setTimeout(()=>{
    ring.pause();
  },8000);
}

function fakeVideo(){
  alert("🎥 تماس تصویری");
}

/* VOICE REC FIXED */
let recorder;
let chunks=[];

async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});

    recorder=new MediaRecorder(stream);
    chunks=[];

    recorder.ondataavailable=e=>chunks.push(e.data);

    recorder.onstop=()=>{
      const blob=new Blob(chunks,{type:"audio/webm"});
      const url=URL.createObjectURL(blob);

      const now=new Date();
      const time=now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");

      messages.push({
        type:"me",
        voice:url,
        time
      });

      render();
    };

    recorder.start();

  } catch(err){
    alert("دسترسی به میکروفون داده نشد");
  }
}

function stopRec(){
  if(recorder && recorder.state!=="inactive"){
    recorder.stop();
  }
}

render();

</script>

</body>
</html>

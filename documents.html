<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Files</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#111;
    color:white;
    padding:25px;
}

.container{
    display:flex;
    flex-direction:column;
    gap:35px;
}

/* پوشه */
.folder{
    width:95px;
    text-align:center;
    text-decoration:none;
    color:white;
}

.folder img{
    width:72px;
    display:block;
    margin:auto;
}

.folder span{
    display:block;
    margin-top:8px;
    font-size:15px;
}

/* عکس پایین */
.photo{
    width:100%;
    max-width:320px;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 18px rgba(0,0,0,.4);
}

.photo img{
    width:100%;
    display:block;
}
</style>
</head>

<body>

<div class="container">

    <!-- پوشه -->
    <a href="victim.html" class="folder">
        <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
        <span>قربانی</span>
    </a>

    <!-- عکس -->
    <div class="photo">
        <img src="waa.png">
    </div>

</div>

</body>
</html>

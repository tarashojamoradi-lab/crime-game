<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tash chat</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0f;
  color:white;
}

/* TOP BAR */
.top{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  background:rgba(20,20,30,0.85);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  object-fit:cover;
}

.callBox{
  display:flex;
  gap:10px;
  align-items:center;
}

.btn{
  cursor:pointer;
  opacity:0.8;
  font-size:18px;
}

#chat{
  padding:12px;
  height:calc(100vh - 140px);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:14px;
  font-size:14px;
  animation:pop 0.2s ease;
}

@keyframes pop{
  from{transform:scale(0.9); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

/* ✅ FIXED ALIGN + COLORS */
.other{
  background:linear-gradient(135deg,#ff9f43,#ff6b6b);
  align-self:flex-start; /* چپ */
  color:white;
}

.me{
  background:rgba(255,255,255,0.08);
  align-self:flex-end; /* راست */
  color:white;
}

.queen{
  background:rgba(255,255,255,0.08);
  align-self:flex-end; /* راست */
  color:white;
}

.time{
  font-size:10px;
  opacity:0.6;
  margin-top:4px;
}

.typing{
  align-self:flex-end;
  font-size:12px;
  opacity:0.7;
  padding:6px 10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:8px;
  padding:10px;
  background:rgba(20,20,30,0.9);
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
  background:#1e1e2a;
  color:white;
}

.send{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ff4d4d;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.voice{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#333;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.voiceMsg{
  background:#2b2b3a;
  padding:10px;
  border-radius:14px;
  max-width:75%;
  display:flex;
  flex-direction:column;
  gap:6px;
}
</style>
</head>

<body>

<audio id="ding" src="ding.mp3" preload="auto"></audio>

<div class="top">

  <div class="btn" onclick="location.href='home.html'">🏠</div>

  <div class="profile">
    <img src="tara.png" class="avatar">
    <div>گل سفید</div>
  </div>

  <div class="callBox">
    <div class="btn" onclick="fakeCall('voice')">📞</div>
    <div class="btn" onclick="fakeCall('video')">🎥</div>
    <div class="btn" onclick="history.back()">←</div>
  </div>

</div>

<div id="chat"></div>

<div class="inputBox">
  <div class="voice"
     onmousedown="startRec()" 
     onmouseup="stopRec()" 
     ontouchstart="startRec()" 
     ontouchend="stopRec()">🎤</div>

  <input id="text" placeholder="پیام بنویس...">
  <div class="send" onclick="sendMsg()">➤</div>
</div>

<script>

const chat=document.getElementById("chat");
const dingSound=document.getElementById("ding");

const messages=[
{type:"me",text:"سلام زیبارو.",time:"12:00"},
{type:"other",text:"سلام شما؟",time:"12:01"},
{type:"me",text:"یعنی نمیشناسی دیگه لوبیا خانم؟",time:"12:02"},
{type:"other",text:"عهههه....",time:"12:03"},
{type:"other",text:"یه سؤال بپرسم؟",time:"12:04"},
{type:"me",text:"فقط یک دونه؟",time:"12:05"},
{type:"other",text:"جدی میگم.",time:"12:06"},
{type:"me",text:"باشه.",time:"12:07"},
{type:"other",text:"تو این شماره رو از کجا پیدا کردی؟",time:"12:08"},
{type:"me",text:"از همون جایی که آدم‌ها چیزای مهمشون رو پنهان می‌کنن.",time:"12:09"},
{type:"other",text:"این جواب نیست.",time:"12:10"},
{type:"me",text:"می‌دونم.",time:"12:11"},
{type:"other",text:"حتی توی اون یکی گوشیم هم ذخیره‌ش نکرده بودم.",time:"12:12"},
{type:"me",text:"پس معلومه خوب قایمش کرده بودی.",time:"12:13"},
{type:"other",text:"...",time:"12:14"},
{type:"other",text:"گاهی واقعاً نمی‌فهمم تو باید نگرانم کنی یا نه.",time:"12:15"},
{type:"me",text:"و به چی رسیدی؟",time:"12:16"},
{type:"other",text:"به اینکه اگه آدم‌ها رو فقط با عجیب بودنشون قضاوت کنیم، نصف دنیا باید تنها بمونه.",time:"12:17"},
{type:"me",text:"تو زیادی به آدم‌ها فرصت میدی.",time:"12:18"},
{type:"other",text:"و تو زیادی زود خودتو ازشون محروم می‌کنی.",time:"12:19"},
{type:"me",text:"شاید.",time:"12:20"},
{type:"other",text:"راستی...",time:"12:21"},
{type:"other",text:"با این حال هنوز جواب پیام‌هات رو میدم.",time:"12:22"},
{type:"me",text:"متوجه شدم.",time:"12:23"},
{type:"other",text:"مغرور نشو.",time:"12:24"},
{type:"me",text:"دیر گفتی.",time:"12:25"}
];

function render(){
  chat.innerHTML="";
  messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+m.type;
    div.innerHTML=`${m.text}<div class="time">${m.time}</div>`;
    chat.appendChild(div);
  });
  chat.scrollTop=chat.scrollHeight;
}

function sendMsg(){
  const input=document.getElementById("text");
  if(!input.value.trim()) return;

  const now=new Date();
  const time=now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");

  messages.push({
    type:"me",
    text:input.value,
    time:time
  });

  input.value="";
  render();
}

function fakeCall(type){
  alert(type==="voice" ? "📞 تماس صوتی" : "🎥 تماس تصویری");
}

let recorder;
let chunks=[];

async function startRec(){
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  recorder=new MediaRecorder(stream);
  chunks=[];

  recorder.ondataavailable=e=>chunks.push(e.data);

  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:"audio/webm"});
    const url=URL.createObjectURL(blob);

    const now=new Date();
    const time=now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");

    messages.push({
      type:"me",
      voice:url,
      time:time
    });

    render();
  };

  recorder.start();
}

function stopRec(){
  if(recorder && recorder.state!=="inactive"){
    recorder.stop();
  }
}

render();

</script>

</body>
</html>

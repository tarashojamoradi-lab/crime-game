<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>CLASSIFIED CASE</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  overflow: hidden;
  color: white;
  background:black;
  transition: 0.3s;
}

body.flashBW {
  filter: grayscale(1);
}

.screen {
  display: none;
  width: 100vw;
  height: 100vh;
  background-size: cover;
  background-position: center;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
  position: absolute;
  transition: all 1s ease;
  filter: brightness(0.9);
}

.active {
  display: flex;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: scale(1.03);}
  to {opacity:1; transform: scale(1);}
}

.screen::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  top:0;
  left:0;
}

.box {
  background: rgba(0,0,0,0.72);
  padding: 20px;
  border-radius: 14px;
  max-width: 80%;
  backdrop-filter: blur(6px);
  z-index:2;
}

.glitch { animation: flicker 0.25s infinite; }
@keyframes flicker {
  0% {opacity:1;}
  50% {opacity:0.6;}
  100% {opacity:1;}
}

.shake { animation: shake 0.4s infinite; }
@keyframes shake {
  0% {transform: translate(1px,1px);}
  50% {transform: translate(-1px,2px);}
  100% {transform: translate(1px,-1px);}
}

.flash {
  position: fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  z-index:999;
  transition:0.2s;
}

.profile {
  width: 180px;
  height: 240px;
  object-fit: cover;
  border-radius: 10px;
  border: 2px solid white;
  margin-top: 10px;
  opacity:0;
  transition: 1s;
}

.profile.show { opacity:1; }

.counter {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 14px;
  opacity: 0.8;
  z-index: 10;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div id="s1" class="screen active" style="background-image:url('maz.png')">
  <div class="box">

    <h3>تحت نظر از مدت ها قبل...</h3>

    <p>
      یک شب در قطار...<br>
      بازیگر فیلمی + کارآگاه معروف...<br>
      حاصل ۵ حرفی؟
    </p>

    <input id="riddle" placeholder="پاسخ">
    <br><br>

    <button id="btn" onclick="checkRiddle()">ورود</button>

    <p id="msg"></p>

  </div>
</div>

<div id="s2" class="screen glitch shake">
  <div class="box">
    <p>⚠ پرونده اشتباهی باز شد…</p>
    <button onclick="next(3)">ادامه</button>
  </div>
</div>

<div id="s3" class="screen" style="background-image:url('back.png')">
  <div class="box">

    <h2>مطهره</h2>
    <img src="mot.jpg" class="profile" id="profile">

    <button onclick="next(4)">باز کردن پرونده</button>

  </div>
</div>

<div id="s4" class="screen" style="background-image:url('mot.jpg')">
  <div class="box">

    <h2>پرونده BD-0623</h2>

    <p id="accusations"></p>

    <button onclick="finalReveal()">مدرک نهایی</button>
    <p id="finalText"></p>

  </div>
</div>

<script>

let used = false;

const accList = [
  "ساختن خاطرات فراموش‌نشدنی",
  "خنداندن اطرافیان",
  "همیشه حمایت کردن",
  "جا نزدن وقتی همه رفتن",
  "بودن وقتی کسی نبود"
];

let i=0, j=0;

function typeAcc(){
  const el = document.getElementById("accusations");
  if(i >= accList.length) return;

  let text = accList[i];

  if(j < text.length){
    el.innerHTML += text[j++];
    setTimeout(typeAcc, 25);
  } else {
    el.innerHTML += "<br><br>";
    i++; j=0;
    setTimeout(typeAcc, 400);
  }
}

function flashFX(){
  const f = document.getElementById("flash");
  f.style.opacity = 0.6;
  setTimeout(()=>f.style.opacity=0,150);
}

function next(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");

  if(n === 2){
    document.body.classList.add("flashBW");
    flashFX();
    setTimeout(()=>document.body.classList.remove("flashBW"), 700);
  }

  if(n === 3){
    setTimeout(()=>document.getElementById("profile").classList.add("show"),600);
  }

  if(n === 4){
    document.getElementById("accusations").innerHTML="";
    i=0; j=0;
    setTimeout(typeAcc, 500);
  }
}

function checkRiddle(){
  if(used) return;

  let val = document.getElementById("riddle").value.trim();
  const msg = document.getElementById("msg");

  if(val === "شهروک"){
    used = true;
    msg.innerHTML = "درست بود...";
    setTimeout(()=>next(2), 600);
  } else {
    msg.innerHTML = "اشتباهه...";
  }
}

document.getElementById("riddle").addEventListener("keydown", e=>{
  if(e.key === "Enter") checkRiddle();
});

function finalReveal(){
  document.getElementById("finalText").innerHTML =
  "این پرونده برای قاتل نبود...<br>برای یادآوری بود...<br><br>تولدت مبارک مطهره ♥️";
}

</script>

</body>
</html>

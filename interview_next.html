<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مصاحبه بعدی</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  font-family: Tahoma, sans-serif;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: url("red.png") no-repeat center center;
  background-size: cover;
}

.container{
  background: rgba(0,0,0,0.5);
  padding: 20px;
  border-radius: 15px;
  max-width: 500px;
  width: 90%;
}

.main-img{
  width: 100%;
  max-height: 600px;
  object-fit: contain;
  border-radius: 14px;
  margin-bottom: 15px;
}

button{
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #b30000;
  color: #fff;
  cursor: pointer;
  margin-top: 10px;
}

button:hover{
  background: #e60000;
}
</style>
</head>
<body>

<div class="container">

<!-- عکس بزرگ روی پس زمینه -->
<img src="phonee.png" class="main-img" alt="مصاحبه بعدی">

<!-- ویس بدون کنترل مرورگر -->
<audio id="voice">
  <source src="mari.acc" type="audio/aac">
  مرورگر شما از پخش صدا پشتیبانی نمی‌کند
</audio>

<!-- دکمه پلی -->
<button onclick="document.getElementById('voice').play()">▶️ پخش ویس</button>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="fa"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Final Case</title>
<style>
body{margin:0;font-family:tahoma;direction:rtl;background:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),url('tat.png') center center/contain no-repeat fixed #000;
height:100vh;display:flex;justify-content:center;align-items:center;color:#fff;overflow:hidden}
#flash,#black{position:fixed;inset:0;pointer-events:none}
#flash{background:#fff;opacity:0;z-index:20}
#black{background:#000;opacity:0;transition:.2s;z-index:19}
@keyframes cam{0%{opacity:0}50%{opacity:1}100%{opacity:0}}
.box{width:min(88vw,460px);background:rgba(255,255,255,.08);backdrop-filter:blur(12px);padding:18px;border-radius:18px;border:1px solid rgba(255,255,255,.12);opacity:0;transform:translateY(20px);transition:1s;text-align:center}
input{width:100%;padding:12px;border-radius:10px;border:none;background:#ffffff22;color:#fff}
button{margin-top:16px;padding:12px 28px;background:#8b0000;color:#fff;border:none;border-radius:10px}
#stamp{position:fixed;left:50%;top:-250px;transform:translateX(-50%) rotate(-12deg) scale(2);padding:12px 26px;font-size:38px;font-weight:bold;border:5px solid #b30000;color:#b30000;background:rgba(255,255,255,.06);opacity:0;z-index:50}
@keyframes stampHit{0%{top:-250px;opacity:0;transform:translateX(-50%) rotate(-12deg) scale(2)}70%{top:50%;opacity:1;transform:translate(-50%,-50%) rotate(-12deg) scale(.9)}100%{top:50%;opacity:1;transform:translate(-50%,-50%) rotate(-12deg) scale(1)}}
</style></head>
<body>
<div id="flash"></div><div id="black"></div>
<div style="width:min(88vw,460px);text-align:center">
<div id="title" style="font-size:28px;min-height:40px"></div>
<div class="box" id="box">
<input id="answer" placeholder="پاسخ را وارد کنید">
<button id="btn">تأیید</button>
<div id="msg" style="margin-top:12px"></div>
</div></div>
<div id="stamp">CASE CLOSED</div>
<script>
const ok=["ریوزاکی","ریوزکی","ریوزاکی تاتسوزاکی","ریوزکی تاتسوزاکی"];
const stamp=new Audio("stamp.mp3"),shot=new Audio("flash.mp3");
const flashEl=document.getElementById("flash"),black=document.getElementById("black");
let t="شما فقط یک فرصت دارید.",i=0;
(function type(){if(i<t.length){title.textContent+=t[i++];setTimeout(type,80)}else setTimeout(()=>{box.style.opacity=1;box.style.transform='translateY(0)'},3000)})();
btn.onclick=check;answer.addEventListener("keydown",e=>{if(e.key==="Enter")check()});
function flash(){flashEl.style.animation="cam .12s";shot.currentTime=0;shot.play();setTimeout(()=>flashEl.style.animation="",140)}
function check(){
let v=answer.value.trim().replace(/\u200c/g,"").replace(/\s+/g," ");
if(ok.includes(v)){
msg.textContent="✓ پاسخ صحیح";
btn.disabled=true;
setTimeout(()=>{
    stamp.currentTime=0;
    stamp.play();

    const s = document.getElementById("stamp");
    s.style.animation = "stampHit .45s forwards";

    // بعد از ۱.۲ ثانیه مهر بلند می‌شود و ناپدید می‌شود
    setTimeout(()=>{
        s.style.transition = ".4s ease";
        s.style.transform = "translate(-50%,-180%) rotate(-12deg) scale(.9)";
        s.style.opacity = "0";
    },1200);

},700);
setTimeout(()=>{black.style.opacity=1;},2200);
setTimeout(()=>{flash();},3200);
setTimeout(()=>{location.href="truthh.html";},3700);
}else msg.innerHTML="هنوز بخشی از گذشته را ندیده‌ای...<br>دوباره پرونده را مرور کن.";
}
</script></body></html>

<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home OS</title>
<style>
body{margin:0;font-family:sans-serif;overflow:hidden;touch-action:none;}
#home{position:fixed;inset:0;background:url("red.png") center/cover no-repeat;display:flex;flex-direction:column;}
#statusBar{display:flex;justify-content:space-between;padding:10px 15px;font-size:12px;color:white;background:rgba(0,0,0,.25);backdrop-filter:blur(5px);}
#appsWrapper{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch;}
#apps{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.app{text-align:center;color:white;font-size:11px;cursor:pointer;}
.icon{width:58px;height:58px;margin:auto;border-radius:16px;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:20px;transition:.15s;overflow:hidden;}
.icon img{width:100%;height:100%;object-fit:cover;border-radius:16px;display:block;}
.app:active .icon{transform:scale(.88);}
#dock{display:flex;justify-content:space-between;align-items:center;padding:10px 40px;background:rgba(0,0,0,.35);backdrop-filter:blur(10px);}
.dockIcon{width:55px;height:55px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:22px;color:white;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);cursor:pointer;transition:.15s;}
.dockIcon:active{transform:scale(.9);}
#appsWrapper::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="home">
<div id="statusBar"><div>📶 LTE 4G</div><div>12:45 🔋 85%</div></div>
<div id="appsWrapper"><div id="apps">
<div class="app" onclick="openApp('telephone2.html')"><div class="icon">📞</div>Phone</div>
<div class="app" onclick="openApp('messages2.html')"><div class="icon">💬</div>Messages</div>
<div class="app" onclick="openApp('camera2.html')"><div class="icon">📷</div>Camera</div>
<div class="app" onclick="openApp('gallery.html')"><div class="icon">🖼</div>Gallery</div>
<div class="app" onclick="openApp('files2.html')"><div class="icon">📁</div>File Manager</div>
<div class="app" onclick="openApp('notes.html')"><div class="icon">📝</div>Notes</div>
<div class="app" onclick="openApp('browser.html')"><div class="icon">🌐</div>Browser</div>
<div class="app" onclick="openApp('recorder.html')"><div class="icon">🎙</div>Recorder</div>
<div class="app" onclick="openApp('contacts2.html')"><div class="icon">👤</div>Contacts</div>
<div class="app" onclick="openApp('maps.html')"><div class="icon">📍</div>Maps</div>
<div class="app" onclick="openApp('settings.html')"><div class="icon">⚙</div>Settings</div>
<div class="app" onclick="openApp('music.html')"><div class="icon">🎵</div>Music</div>
<div class="app" onclick="openApp('instagram2.html')"><div class="icon"><img src="Instagram.png" alt="Instagram"></div>Instagram</div>
<div class="app" onclick="fakeApp()"><div class="icon">⬛</div>Black Box</div>
<div class="app" onclick="fakeApp()"><div class="icon">◼</div>Unknown</div>
<div class="app" onclick="fakeApp()"><div class="icon">?</div>????</div>
<div class="app" onclick="fakeApp()"><div class="icon">👁</div>Hidden</div>
</div></div>
<div id="dock">
<div class="dockIcon" onclick="openApp('camera.html')">📷</div>
<div class="dockIcon" onclick="openApp('messages2.html')">💬</div>
<div class="dockIcon" onclick="openApp('telephone2.html')">📞</div>
</div></div>
<script>
function openApp(page){window.location.href=page;}
function fakeApp(){document.body.style.animation="shake 0.2s";setTimeout(()=>document.body.style.animation="",200);}
</script>
</body></html>

<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNKNOWN NOTES</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#000;
    color:#fff;
}

/* صفحه اصلی */
.screen{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

/* لیست نوت‌ها */
.note-item{
    background:#111;
    margin-bottom:12px;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    border:1px solid #222;
    transition:0.2s;
}

.note-item:hover{
    background:#1a1a1a;
}

/* عنوان */
.title{
    font-size:13px;
    opacity:0.6;
}

/* متن کوتاه */
.preview{
    margin-top:6px;
    font-size:14px;
}

/* صفحه داخلی نوت */
.full-note{
    background:#000;
}

.back{
    margin-bottom:20px;
    color:#aaa;
    cursor:pointer;
}

/* متن کامل */
.content{
    white-space:pre-line;
    font-size:15px;
    line-height:1.7;
}

/* انیمیشن */
.fade{
    animation:fade 0.3s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- صفحه لیست -->
<div id="listScreen" class="screen active fade">

    <h3>UNKNOWN NOTES</h3>

    <div class="note-item" onclick="openNote(1)">
        <div class="title">17 May • 08:00</div>
        <div class="preview">اگه اینو می‌خونی...</div>
    </div>

    <div class="note-item" onclick="openNote(2)">
        <div class="title">14 May • 22:00</div>
        <div class="preview">Joker / Batman / IT</div>
    </div>

    <div class="note-item" onclick="openNote(3)">
        <div class="title">15 May • 18:00</div>
        <div class="preview">رمز 1248 یا 1249؟</div>
    </div>

    <div class="note-item" onclick="openNote(4)">
        <div class="title">16 May</div>
        <div class="preview">لباسا رو باید بشورم...</div>
    </div>

    <div class="note-item" onclick="openNote(5)">
        <div class="title">16 May</div>
        <div class="preview">🔒 تونل مخفی سیرک</div>
    </div>

</div>

<!-- صفحه نوت کامل -->
<div id="noteScreen" class="screen full-note fade">

    <div class="back" onclick="back()">← Back</div>

    <div class="content" id="content"></div>

</div>

<script>

const notes = {
1: `17 May • 08:00

اگه اینو می‌خونی، یعنی گوشی هنوز دست توئه.
پس یعنی من هنوز پیدام نکردن… یا برعکس....`,

2: `14 May • 22:00

اسم فیلمایی که باید ببینم:
Joker
The Batman
IT`,

3: `15 May • 18:00

رمز احتمالی: 1248 یا 1249؟ تست کنم`,

4: `16 May

لباسا رو باید بشورم، مخصوصاً آخرین لباس اجرام
یادت نره روش خون ریخته 😂`,

5: `16 May

🔒 تونل مخفی سیرک
(دسترسی محدود)`
};

function openNote(id){
    document.getElementById("listScreen").classList.remove("active");
    document.getElementById("noteScreen").classList.add("active");

    document.getElementById("content").innerText = notes[id];
}

function back(){
    document.getElementById("noteScreen").classList.remove("active");
    document.getElementById("listScreen").classList.add("active");
}

</script>

</body>
</html>

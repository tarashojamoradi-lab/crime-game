<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="utf-8">
<title>پرونده ریوزکی</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:tahoma}
#bg{position:fixed;inset:0;background:url('tat.png') center/cover no-repeat;filter:brightness(.35)}
#img{position:fixed;inset:0;background:center/contain no-repeat;opacity:0;transition:opacity 1s,transform 8s;transform:scale(1)}
#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:70%;color:#fff;
font-size:2rem;text-align:center;opacity:0;transition:opacity 1s;text-shadow:0 0 15px #000}
.flash{animation:f .3s}@keyframes f{0%{filter:brightness(1)}50%{filter:brightness(4)}100%{filter:brightness(1)}}
</style></head><body>
<div id=bg></div><div id=img></div><div id=text></div>
<audio id=aud src="ajib.mp3"></audio>
<script>
const s=[
["حقیقت پرونده...",null],["ریوزکی تاتسوزاکی، پس از مرگ مادرش، توسط پدرش در سیرک رها شد.","child.png"],
["پشت آن لبخندها، پسری زندگی می‌کرد که هرگز عشق، خانواده و امنیت را نشناخت.",null],
["پدرش آکومو کوروشیما بود؛ همان دلقک قاتل.",null],
["ریوزکی هر روز بیشتر شبیه پدرش می‌شد.",null],
["اما حقیقت تلخ‌تر بود...",null],
["این بار، پسر دلقک قاتل بیدار شده بود.",null],
["او هرگز نتوانست میتسوکی را بکشد.","see.png"],
["میتسوکی پشت چهره یک قاتل، کودکی زخمی را دید.",null],
["اما کاگه فوجیوارا نمی‌توانست این خوشبختی را تحمل کند.","white.png"],
["قربانی‌های ریوزکی اتفاقی انتخاب نمی‌شدند.",null],
["او انسان‌ها را نمی‌کشت...",null],
["او خوشبختی را می‌کشت.",null],
["شاید ریوزکی یک قاتل بود...",null],
["اما پیش از آن، کودکی بود که هیچ‌وقت کسی دستش را نگرفت.",null]
];
let i=0,t=document.getElementById('text'),im=document.getElementById('img');
aud.volume=0;aud.play().catch(()=>{});
let v=0;let fi=setInterval(()=>{if(v<1){v+=.05;aud.volume=v}else clearInterval(fi)},200);
function next(){
 if(i>=s.length){let fo=setInterval(()=>{if(aud.volume>0.05)aud.volume-=.05;else{aud.pause();clearInterval(fo)}},200);return;}
 let [tx,p]=s[i++];t.style.opacity=0;im.style.opacity=0;
 setTimeout(()=>{
 t.innerHTML=tx;t.style.opacity=1;
 if(p){im.style.backgroundImage=`url(${p})`;im.style.transform='scale(1.08)';im.style.opacity=.95;}
 },700);
 setTimeout(next,5000);
}
next();
</script></body></html>

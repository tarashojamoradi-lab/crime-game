<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قاتل کیست؟</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
background:url('marg.png') center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
font-family:Tahoma,sans-serif;
padding:20px;
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.12);
}

.overlay{
position:relative;
z-index:2;
width:100%;
max-width:320px;
padding:25px;
border-radius:18px;
text-align:center;
background:rgba(0,0,0,0.10);
border:1px solid rgba(255,255,255,0.25);
box-shadow:0 8px 25px rgba(0,0,0,.25);
}

.confidential{
color:#ff4d4d;
font-weight:bold;
letter-spacing:3px;
margin-bottom:10px;
}

.casefile{
color:#ddd;
font-size:14px;
margin-bottom:20px;
line-height:1.7;
}

#typewriter{
color:white;
font-size:20px;
line-height:1.8;
min-height:120px;
margin-bottom:20px;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
text-align:center;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.message{
margin-top:15px;
font-weight:bold;
min-height:24px;
}

.success{
color:#4cff4c;
}

.error{
color:#ff4c4c;
}

.counter{
margin-top:10px;
color:#ddd;
font-size:14px;
}

#finalMessage{
display:none;
margin-top:15px;
color:#4cff4c;
line-height:1.8;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

.flash{
animation:flashSuccess 1s ease;
}

@keyframes flashSuccess{
0%{box-shadow:0 0 0 rgba(0,255,0,0);}
50%{box-shadow:0 0 35px rgba(0,255,0,.9);}
100%{box-shadow:0 0 0 rgba(0,255,0,0);}
}
</style>
</head>

<body>

<div class="overlay" id="box">

<div class="confidential">CONFIDENTIAL</div>

<div class="casefile">
پرونده بسته شد<br>
آخرین گزارش بازپرس
</div>

<div id="typewriter"></div>

<input
type="text"
id="answer"
placeholder="نام قاتل را وارد کنید">

<button onclick="checkAnswer()">
بررسی پاسخ
</button>

<div id="message" class="message"></div>

<div id="finalMessage"></div>

<div class="counter">
تعداد تلاش: <span id="attempts">0</span>
</div>

</div>

<script>

const text =
`پس از بررسی تمام مدارک...

تنها یک سؤال باقی مانده است...

قاتل کیست؟`;

let i = 0;
let attempts = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("typewriter").innerHTML =
text.substring(0,i+1) +
'<span class="cursor">|</span>';

i++;
setTimeout(typeWriter,40);
}
}

typeWriter();

function checkAnswer(){

const answer = document
.getElementById("answer")
.value
.trim()
.toLowerCase();

const message = document.getElementById("message");
const finalMessage = document.getElementById("finalMessage");
const box = document.getElementById("box");

if(
answer === "الیزابت" ||
answer === "الیزابت بومونت" ||
answer === "elizabeth" ||
answer === "elizabeth beaumont"
){

message.className = "message success";
message.innerHTML = "✓ پاسخ درست است";

box.classList.add("flash");

finalMessage.style.display = "block";
finalMessage.innerHTML =
"در حال تأیید نتیجه تحقیقات...<br><br>هویت قاتل تأیید شد.";

setTimeout(function(){
window.location.href = "story.html";
},3000);

}else{

attempts++;
document.getElementById("attempts").innerText = attempts;

message.className = "message error";
message.innerHTML = "✗ پاسخ غلط است";

box.classList.remove("shake");
void box.offsetWidth;
box.classList.add("shake");
}
}

document.getElementById("answer").addEventListener("keydown",function(e){
if(e.key === "Enter"){
checkAnswer();
}
});

</script>

</body>
</html>

<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Location</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:tahoma,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#050505;color:#fff}
#map{position:fixed;inset:0;background:url("baa.png") center/cover no-repeat;animation:show .6s ease}
@keyframes show{from{opacity:0;transform:scale(1.05)}to{opacity:1;transform:scale(1)}}
.glass{background:rgba(12,12,12,.62);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:14px}
#title{position:absolute;left:50%;top:14px;transform:translateX(-50%);padding:10px 18px;font-size:17px}
#track{position:absolute;left:12px;top:12px;padding:10px 14px;font-size:13px;line-height:1.6}
#compass{position:absolute;right:12px;top:12px;width:62px;height:62px;display:flex;align-items:center;justify-content:center;font-size:30px}
#btn{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);padding:14px 26px;border:none;border-radius:14px;background:rgba(180,0,0,.9);color:#fff;font-size:17px}
#hint{position:absolute;right:12px;bottom:20px;padding:8px 12px;font-size:12px}
</style></head><body>
<div id="map">
<div id="title" class="glass">موقعیت شناسایی شد</div>
<div id="track" class="glass"><b>TRACKING</b><br>LOCKED</div>
<div id="compass" class="glass">🧭</div>
<div id="hint" class="glass">پرونده آماده بررسی است</div>
<button id="btn">ادامه بررسی</button>
</div>
<script>
let a=0;setInterval(()=>{a+=.4;document.getElementById("compass").style.rotate=a+"deg"},30);
document.getElementById("btn").onclick=()=>{alert("کارآگاه امکان بررسی این بخش هنوز برای شما فعال نیست.");};
</script></body></html>

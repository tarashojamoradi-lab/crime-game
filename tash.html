<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tash chat</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0f;
  color:white;
}

/* TOP BAR */
.top{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  background:rgba(20,20,30,0.85);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  object-fit:cover;
}

.callBox{
  display:flex;
  gap:10px;
  align-items:center;
}

.btn{
  cursor:pointer;
  opacity:0.8;
  font-size:18px;
}

/* CHAT */
#chat{
  padding:12px;
  height:calc(100vh - 140px);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE */
.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:14px;
  font-size:14px;
  animation:pop 0.2s ease;
}

@keyframes pop{
  from{transform:scale(0.9); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.queen{
  background:#3a0f1f; /* 🔥 زرشکی تیره */
  align-self:flex-end;
}

.me{
  background:rgba(255,255,255,0.08);
  align-self:flex-start;
}

.time{
  font-size:10px;
  opacity:0.6;
  margin-top:4px;
}

/* INPUT */
.inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:8px;
  padding:10px;
  background:rgba(20,20,30,0.9);
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
  background:#1e1e2a;
  color:white;
}

.send{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ff4d4d;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.voice{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#333;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

/* VOICE MESSAGE */
.voiceMsg{
  background:#2b2b3a;
  padding:10px;
  border-radius:14px;
  max-width:75%;
  display:flex;
  flex-direction:column;
  gap:6px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">

  <div class="btn" onclick="location.href='home.html'">🏠</div>

  <div class="profile">
    <img src="tara.png" class="avatar">
    <div>ملکه تشویق</div>
  </div>

  <div class="callBox">
    <div class="btn" onclick="fakeCall('voice')">📞</div>
    <div class="btn" onclick="fakeCall('video')">🎥</div>
    <div class="btn" onclick="history.back()">←</div>
  </div>

</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="inputBox">
  <div class="voice">🎤</div>
  <input id="text" placeholder="پیام بنویس...">
  <div class="send" onclick="sendMsg()">➤</div>
</div>

<script>

const chat=document.getElementById("chat");

/* messages */
const messages=[
  {type:"queen", text:"امروز از کنار سیرک رد شدمممم 😭😭", time:"14:21"},
  {type:"queen", text:"تو منو یادت میاد؟ ردیف اول می‌شستم.", time:"14:22"},
  {type:"me", text:"آدم‌ها عوض می‌شن.", time:"14:24"},
  {type:"queen", text:"ولی من نه! هنوز اون گل کاغذی رو دارم.", time:"14:25"}
];

function render(){
  chat.innerHTML="";

  messages.forEach(m=>{
    const div=document.createElement("div");

    div.className="msg "+m.type;
    div.innerHTML=`
      ${m.text}
      <div class="time">${m.time}</div>
    `;

    chat.appendChild(div);
  });

  chat.scrollTop=chat.scrollHeight;
}

/* send */
function sendMsg(){
  const input=document.getElementById("text");
  if(!input.value.trim()) return;

  const now=new Date();
  const time=now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");

  messages.push({
    type:"me",
    text:input.value,
    time:time
  });

  input.value="";
  render();
}

/* fake call */
function fakeCall(type){
  alert(type==="voice" ? "📞 تماس صوتی" : "🎥 تماس تصویری");
}

/* init */
render();

</script>

</body>
</html>
